<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Attendance Card | SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAT3LQUFBhiZINM9NZTulX7umf-P1Y6i2I",
            authDomain: "sp-build-official.firebaseapp.com",
            projectId: "sp-build-official",
            storageBucket: "sp-build-official.firebasestorage.app",
            messagingSenderId: "377403616440",
            appId: "1:377403616440:web:bfae56e748f05de22a184d",
            measurementId: "G-P319FN0C0N",
            databaseURL: "https://sp-build-official-default-rtdb.firebaseio.com/"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.ref = ref;
        window.get = get;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .logo-icon span { font-size: 1.3rem; font-weight: 800; color: white; }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text h1 { font-size: 1.1rem; font-weight: 700; color: white; }
        .logo-text p { font-size: 0.5rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.75rem;
            transition: all 0.3s;
        }
        .nav-btn:hover { background: #f59e0b; border-color: transparent; transform: translateY(-2px); }
        
        /* Search Card */
        .search-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .search-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1e293b;
            border-left: 4px solid #f59e0b;
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .auto-badge {
            background: #fef3c7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #d97706;
        }
        .mode-toggle {
            display: flex;
            gap: 8px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #64748b;
            font-size: 0.8rem;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 2px 8px rgba(245,158,11,0.3);
        }
        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-input-group {
            flex: 1;
            min-width: 160px;
        }
        .search-input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
        }
        .search-input-group input, .search-input-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.85rem;
            background: white;
        }
        .search-input-group input:focus, .search-input-group select:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .search-input-group select:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }
        .search-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 22px;
            transition: all 0.3s;
            height: 42px;
        }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245,158,11,0.4); }
        
        .card-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        /* ========== NEW ATTENDANCE CARD DESIGN ========== */
        .attendance-card {
            width: 580px;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transition: transform 0.3s ease;
        }
        .attendance-card:hover { transform: translateY(-5px); }
        
        /* Card Header */
        .card-header {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            padding: 20px 24px;
            text-align: center;
            position: relative;
        }
        .company-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .brand-logo span { font-size: 1.2rem; font-weight: 800; color: white; }
        .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text h2 { font-size: 1rem; font-weight: 700; color: white; }
        .brand-text p { font-size: 0.45rem; color: #fcd34d; letter-spacing: 1px; }
        .card-badge {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(245,158,11,0.2);
            border: 1px solid rgba(245,158,11,0.5);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.55rem;
            font-weight: 600;
            color: #fcd34d;
        }
        
        /* Card Body */
        .card-body {
            padding: 24px;
        }
        
        /* Profile Section */
        .profile-section {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #fef3c7, #fffbeb);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f59e0b;
            overflow: hidden;
        }
        .profile-avatar i { font-size: 2.5rem; color: #f59e0b; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info {
            flex: 1;
        }
        .worker-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .worker-id {
            display: inline-block;
            background: #fef3c7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #d97706;
            font-family: monospace;
        }
        .contact-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #64748b;
        }
        .contact-info i { color: #f59e0b; width: 20px; }
        
        /* Month Badge */
        .month-badge {
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            border-radius: 30px;
            padding: 8px 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .month-badge span { font-size: 0.75rem; font-weight: 700; color: #0369a1; }
        .month-badge i { margin-right: 6px; }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat-box:hover { transform: translateY(-3px); background: #fef3c7; }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
        }
        .stat-label {
            font-size: 0.6rem;
            color: #64748b;
            font-weight: 500;
            margin-top: 4px;
        }
        
        /* Financial Row */
        .financial-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .financial-box {
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .financial-box.earnings { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-left: 3px solid #22c55e; }
        .financial-box.paid { background: linear-gradient(135deg, #eff6ff, #dbeafe); border-left: 3px solid #3b82f6; }
        .financial-box.due { background: linear-gradient(135deg, #fff7ed, #fffbeb); border-left: 3px solid #f59e0b; }
        .financial-label {
            font-size: 0.6rem;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .financial-amount {
            font-size: 1rem;
            font-weight: 800;
            color: #1e293b;
        }
        
        /* Hours Row */
        .hours-row {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .hours-row i { color: #f59e0b; font-size: 1rem; }
        .hours-text { font-size: 0.75rem; color: #475569; }
        .hours-text strong { color: #f59e0b; }
        
        /* Address */
        .address-row {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .address-row i { color: #f59e0b; }
        .address-text { font-size: 0.65rem; color: #64748b; line-height: 1.4; }
        
        /* Card Footer */
        .card-footer {
            background: #f8fafc;
            padding: 12px 24px;
            text-align: center;
            border-top: 1px solid #eef2f6;
        }
        .card-footer p { font-size: 0.55rem; color: #94a3b8; }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .download-btn, .print-btn {
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .download-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 2px 8px rgba(34,197,94,0.3);
        }
        .print-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }
        .download-btn:hover, .print-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading.show { display: flex; }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(245,158,11,0.2);
            border-top: 4px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.8rem;
            border-left: 3px solid #dc2626;
        }
        .error-msg.show { display: block; }
        
        .no-data-card {
            background: white;
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            color: #64748b;
        }
        
        @media (max-width: 620px) {
            .attendance-card { width: 95%; }
            .profile-section { flex-direction: column; align-items: center; text-align: center; }
            .contact-info { justify-content: center; }
            .stats-row, .financial-row { gap: 8px; }
            .stat-number { font-size: 1.2rem; }
            .search-box { flex-direction: column; }
            .search-btn { margin-top: 0; }
        }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="container">
    <div class="header">
        <div class="logo-section">
            <div class="logo-icon" id="headerLogo"><span>SP</span></div>
            <div class="logo-text">
                <h1>SP CONSTRUCTION</h1>
                <p>ATTENDANCE CARD</p>
            </div>
        </div>
        <div class="nav-buttons">
            <a href="attendance.html" class="nav-btn">📋 Attendance</a>
            <a href="dashboard.html" class="nav-btn">🏠 Home</a>
        </div>
    </div>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <div class="search-card">
        <div class="search-title">
            <span><i class="fas fa-id-card"></i> Generate Attendance Card</span>
            <span class="auto-badge" id="modeBadge">🤖 Auto Mode</span>
        </div>
        
        <div class="mode-toggle">
            <button class="mode-btn active" id="autoModeBtn" onclick="setMode('auto')">
                <i class="fas fa-magic"></i> Auto Mode
            </button>
            <button class="mode-btn" id="manualModeBtn" onclick="setMode('manual')">
                <i class="fas fa-calendar-alt"></i> Manual Mode
            </button>
        </div>
        
        <div class="search-box">
            <div class="search-input-group">
                <label><i class="fas fa-user"></i> Worker Name / ID</label>
                <input type="text" id="workerSearch" placeholder="Enter name or ID...">
            </div>
            <div class="search-input-group">
                <label><i class="fas fa-calendar"></i> Month</label>
                <select id="monthSelect" disabled>
                    <option value="1">January</option><option value="2">February</option><option value="3">March</option>
                    <option value="4">April</option><option value="5">May</option><option value="6">June</option>
                    <option value="7">July</option><option value="8">August</option><option value="9">September</option>
                    <option value="10">October</option><option value="11">November</option><option value="12">December</option>
                </select>
            </div>
            <div class="search-input-group">
                <label><i class="fas fa-calendar"></i> Year</label>
                <select id="yearSelect" disabled></select>
            </div>
            <button class="search-btn" onclick="searchAndGenerateCard()"><i class="fas fa-search"></i> Generate</button>
        </div>
    </div>
    
    <div id="cardDisplayArea" class="card-container">
        <div class="no-data-card">
            <i class="fas fa-id-card" style="font-size: 3rem; color: #f59e0b; margin-bottom: 15px; opacity: 0.6;"></i>
            <h3>Attendance Card Generator</h3>
            <p style="margin-top: 8px;">Search a worker by name or ID to generate card</p>
        </div>
    </div>
    
    <div id="actionButtons" class="action-buttons" style="display: none;">
        <button class="download-btn" onclick="downloadCardAsImage()"><i class="fas fa-download"></i> Download</button>
        <button class="print-btn" onclick="printCard()"><i class="fas fa-print"></i> Print</button>
    </div>
</div>

<script type="module">
    let allUsers = [], allAttendance = [], currentUser = null, currentMode = 'auto';
    let currentMonth = new Date().getMonth() + 1, currentYear = new Date().getFullYear();
    let companyLogo = null;
    
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const START_YEAR = 2026, END_YEAR = 2075;
    
    function showLoading(show) { document.getElementById('loading').classList.toggle('show', show); }
    function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 5000); }
    
    function populateYearSelect() {
        const yearSelect = document.getElementById('yearSelect');
        yearSelect.innerHTML = '';
        for (let y = START_YEAR; y <= END_YEAR; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            if (y === currentYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }
    }
    
    async function loadCompanyLogo(uid) {
        if (!uid) return;
        try {
            const logoRef = window.ref(window.db, `users/${uid}/footerLogo`);
            const snapshot = await window.get(logoRef);
            if (snapshot.exists() && snapshot.val()?.startsWith('data:image')) {
                companyLogo = snapshot.val();
                const headerLogo = document.getElementById('headerLogo');
                if (headerLogo) headerLogo.innerHTML = `<img src="${companyLogo}" alt="Logo">`;
            }
        } catch(e) { console.warn(e); }
    }
    
    window.setMode = function(mode) {
        currentMode = mode;
        const autoBtn = document.getElementById('autoModeBtn');
        const manualBtn = document.getElementById('manualModeBtn');
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const badge = document.getElementById('modeBadge');
        
        if (mode === 'auto') {
            autoBtn.classList.add('active');
            manualBtn.classList.remove('active');
            monthSelect.disabled = true;
            yearSelect.disabled = true;
            badge.innerHTML = '🤖 Auto Mode: ' + monthNames[currentMonth-1] + ' ' + currentYear;
            if (currentUser) generateCardForCurrentUser();
        } else {
            autoBtn.classList.remove('active');
            manualBtn.classList.add('active');
            monthSelect.disabled = false;
            yearSelect.disabled = false;
            badge.innerHTML = '📅 Manual Mode: Select Month/Year';
            if (currentUser) {
                currentMonth = parseInt(monthSelect.value);
                currentYear = parseInt(yearSelect.value);
                generateCardForCurrentUser();
            }
        }
    };
    
    async function generateCardForCurrentUser() {
        if (!currentUser) return;
        showLoading(true);
        const stats = calculateStats(currentUser.userId, currentMonth, currentYear);
        renderCard(currentUser, stats, currentMonth, currentYear);
        showLoading(false);
        document.getElementById('actionButtons').style.display = 'flex';
    }
    
    async function loadUsers() {
        try {
            const snapshot = await window.get(window.ref(window.db, 'users'));
            if (snapshot.exists()) allUsers = Object.values(snapshot.val());
        } catch(e) { console.error(e); }
    }
    
    async function loadAttendance() {
        try {
            const snapshot = await window.get(window.ref(window.db, 'attendance'));
            if (snapshot.exists()) allAttendance = Object.values(snapshot.val());
        } catch(e) { console.error(e); }
    }
    
    function calculateStats(workerId, month, year) {
        const monthStr = month.toString().padStart(2, '0');
        const yearStr = year.toString();
        const records = allAttendance.filter(r => r.date && r.workerId === workerId && r.date.startsWith(`${yearStr}-${monthStr}`));
        
        let present = 0, absent = 0, half = 0, hours = 0, earnings = 0, paid = 0;
        records.forEach(r => {
            if (r.status === 'present') present++;
            else if (r.status === 'absent') absent++;
            else if (r.status === 'halfday') half++;
            hours += r.hours || 0;
            earnings += r.earnings || 0;
            paid += r.paid || 0;
        });
        return { present, absent, half, hours: hours.toFixed(1), earnings, paid, due: earnings - paid, workingDays: present + half };
    }
    
    window.searchAndGenerateCard = async function() {
        const term = document.getElementById('workerSearch').value.trim();
        if (!term) { showError('Please enter worker name or ID'); return; }
        
        showLoading(true);
        if (!allUsers.length) await loadUsers();
        if (!allAttendance.length) await loadAttendance();
        
        let user = allUsers.find(u => u.userId === term);
        if (!user) {
            user = allUsers.find(u => `${u.firstName} ${u.lastName}`.toLowerCase().includes(term.toLowerCase()));
        }
        
        if (!user) { showLoading(false); showError('Worker not found!'); return; }
        
        if (currentMode === 'auto') {
            currentMonth = new Date().getMonth() + 1;
            currentYear = new Date().getFullYear();
        } else {
            currentMonth = parseInt(document.getElementById('monthSelect').value);
            currentYear = parseInt(document.getElementById('yearSelect').value);
        }
        
        currentUser = user;
        const stats = calculateStats(user.userId, currentMonth, currentYear);
        renderCard(user, stats, currentMonth, currentYear);
        showLoading(false);
        document.getElementById('actionButtons').style.display = 'flex';
    };
    
    function renderCard(user, stats, month, year) {
        const fullName = `${user.firstName} ${user.lastName}`;
        const phone = user.mobile || 'Not provided';
        const profilePic = user.profilePicture?.startsWith('data:image') ? user.profilePicture : null;
        const companyLogoHTML = companyLogo ? `<img src="${companyLogo}" alt="Logo">` : '<span>SP</span>';
        
        const cardHTML = `
            <div class="attendance-card" id="attendanceCard">
                <div class="card-header">
                    <div class="company-brand">
                        <div class="brand-logo">${companyLogoHTML}</div>
                        <div class="brand-text">
                            <h2>SP CONSTRUCTION</h2>
                            <p>BUILDING DREAMS</p>
                        </div>
                    </div>
                    <div class="card-badge">${currentMode === 'auto' ? 'AUTO MODE' : 'MANUAL MODE'}</div>
                </div>
                
                <div class="card-body">
                    <div class="profile-section">
                        <div class="profile-avatar">
                            ${profilePic ? `<img src="${profilePic}" alt="Profile">` : '<i class="fas fa-hard-hat"></i>'}
                        </div>
                        <div class="profile-info">
                            <div class="worker-name">${escapeHtml(fullName)}</div>
                            <div class="worker-id"><i class="fas fa-qrcode"></i> ${user.userId}</div>
                            <div class="contact-info"><i class="fas fa-phone-alt"></i> ${escapeHtml(phone)}</div>
                        </div>
                    </div>
                    
                    <div class="month-badge">
                        <span><i class="fas fa-calendar-alt"></i> ${monthNames[month-1]} ${year} Report</span>
                    </div>
                    
                    <div class="stats-row">
                        <div class="stat-box"><div class="stat-number">${stats.present}</div><div class="stat-label">Present</div></div>
                        <div class="stat-box"><div class="stat-number">${stats.half}</div><div class="stat-label">Half Day</div></div>
                        <div class="stat-box"><div class="stat-number">${stats.absent}</div><div class="stat-label">Absent</div></div>
                    </div>
                    
                    <div class="financial-row">
                        <div class="financial-box earnings"><div class="financial-label">Total Earnings</div><div class="financial-amount">₹ ${formatNumber(stats.earnings)}</div></div>
                        <div class="financial-box paid"><div class="financial-label">Total Paid</div><div class="financial-amount">₹ ${formatNumber(stats.paid)}</div></div>
                        <div class="financial-box due"><div class="financial-label">Balance Due</div><div class="financial-amount" style="color: ${stats.due < 0 ? '#dc2626' : '#f59e0b'}">₹ ${formatNumber(stats.due)}</div></div>
                    </div>
                    
                    <div class="hours-row">
                        <i class="fas fa-clock"></i>
                        <div class="hours-text">Total Work Hours: <strong>${stats.hours} hrs</strong> (${stats.workingDays} working days)</div>
                    </div>
                    
                    <div class="address-row">
                        <i class="fas fa-map-marker-alt"></i>
                        <div class="address-text">Thane West, Mumbai, Maharashtra - 400601</div>
                    </div>
                </div>
                
                <div class="card-footer">
                    <p>© ${year} SP CONSTRUCTION | All Rights Reserved</p>
                </div>
            </div>
        `;
        
        document.getElementById('cardDisplayArea').innerHTML = cardHTML;
        if (companyLogo) {
            const cardLogo = document.querySelector('.brand-logo');
            if (cardLogo && !cardLogo.querySelector('img')) cardLogo.innerHTML = `<img src="${companyLogo}" alt="Logo">`;
        }
    }
    
    function formatNumber(n) { return Math.round(parseFloat(n) || 0).toLocaleString('en-IN'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    window.downloadCardAsImage = async function() {
        const card = document.getElementById('attendanceCard');
        if (!card) { showError('No card to download'); return; }
        showLoading(true);
        try {
            const canvas = await html2canvas(card, { scale: 3, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `${currentUser?.firstName}_${currentUser?.lastName}_Card.png`;
            link.href = canvas.toDataURL();
            link.click();
        } catch(e) { showError('Download failed'); }
        showLoading(false);
    };
    
    window.printCard = function() {
        const card = document.getElementById('attendanceCard');
        if (!card) { showError('No card to print'); return; }
        const win = window.open('', '_blank');
        win.document.write(`
            <html><head><title>Attendance Card</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
            <style>body{font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f2f5;padding:20px;} @media print{body{background:white;padding:0;}}</style>
            </head><body>${card.outerHTML}<script>window.onload=function(){setTimeout(function(){window.print();setTimeout(function(){window.close();},500);},500);}<\/script></body></html>
        `);
        win.document.close();
    };
    
    document.getElementById('workerSearch').addEventListener('keypress', e => { if (e.key === 'Enter') searchAndGenerateCard(); });
    document.getElementById('monthSelect').addEventListener('change', function() { if (currentMode === 'manual' && currentUser) { currentMonth = parseInt(this.value); generateCardForCurrentUser(); } });
    document.getElementById('yearSelect').addEventListener('change', function() { if (currentMode === 'manual' && currentUser) { currentYear = parseInt(this.value); generateCardForCurrentUser(); } });
    
    populateYearSelect();
    
    window.onAuthStateChanged(window.auth, async (user) => {
        if (!user) { window.location.href = 'login.html'; return; }
        await loadCompanyLogo(user.uid);
        showLoading(true);
        await Promise.all([loadUsers(), loadAttendance()]);
        showLoading(false);
    });
</script>
</body>
</html>
