<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Login - SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK with external config -->
    <script type="module">
        import { firebaseConfig } from './js/firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.ref = ref;
        window.get = get;
        window.set = set;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .auth-container { max-width: 450px; width: 100%; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo-wrapper {
            display: inline-flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.05); padding: 10px 24px; border-radius: 60px;
        }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-icon span { font-size: 1.4rem; font-weight: 800; color: white; }
        .logo-icon img { width: 100%; height: 100%; object-fit: cover; }
        .logo-text h1 { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #ffffff, #fcd34d); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .logo-text p { font-size: 0.6rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
        .auth-card { background: rgba(255,255,255,0.98); border-radius: 32px; padding: 32px 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .auth-header { text-align: center; margin-bottom: 28px; }
        .auth-header h2 { font-size: 1.6rem; font-weight: 700; color: #1e293b; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: 600; color: #334155; margin-bottom: 6px; }
        .input-field {
            position: relative;
            display: flex;
            align-items: center;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            background: #f8fafc;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-field:focus-within {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245,158,11,0.1);
        }
        .input-field i:not(.toggle-password i) {
            position: absolute;
            left: 16px;
            color: #94a3b8;
            font-size: 1rem;
            z-index: 2;
            pointer-events: none;
        }
        .input-field input {
            width: 100%;
            padding: 14px 50px 14px 45px;
            border: none;
            border-radius: 20px;
            font-size: 0.95rem;
            background: transparent;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-field input::placeholder {
            color: #94a3b8;
        }
        /* ===== IMPROVED TOGGLE BUTTON ===== */
        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1.1rem;
            z-index: 2;
            padding: 6px 4px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            width: 32px;
            height: 32px;
        }
        .toggle-password:hover {
            color: #f59e0b;
            background: rgba(245,158,11,0.08);
        }
        .toggle-password:active {
            transform: translateY(-50%) scale(0.92);
        }
        .toggle-password i {
            font-size: 1.1rem;
            transition: all 0.25s ease;
            pointer-events: none;
        }
        .btn {
            width: 100%; padding: 14px; border: none; border-radius: 40px; font-weight: 600; cursor: pointer; background: linear-gradient(135deg, #f59e0b, #d97706); color: white; transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245,158,11,0.3); }
        .btn-secondary { background: transparent; border: 2px solid #e2e8f0; color: #334155; margin-top: 12px; }
        .btn-secondary:hover { background: #f1f5f9; transform: translateY(-2px); box-shadow: none; }
        .auth-links { text-align: center; margin-top: 20px; }
        .auth-links a { color: #f59e0b; text-decoration: none; font-size: 0.8rem; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
        .divider-line { flex: 1; height: 1px; background: #e2e8f0; }
        .alert { padding: 12px; border-radius: 16px; font-size: 0.8rem; margin-bottom: 20px; display: none; }
        .alert-error { background: #ef444415; color: #b91c1c; border: 1px solid #ef444430; }
        .alert-success { background: #22c55e15; color: #15803d; border: 1px solid #22c55e30; }
        .alert.show { display: block; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
        .loading.show { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #f59e0b; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="auth-container">
    <div class="logo-section">
        <div class="logo-wrapper" id="logoWrapper">
            <div class="logo-icon" id="headerLogo"><span>SP</span></div>
            <div class="logo-text">
                <h1 id="headerTitle"></h1>
                <p id="headerSubtitle"></p>
            </div>
        </div>
    </div>
    <div class="auth-card">
        <div class="auth-header"><h2>Welcome Back! </h2></div>
        <div id="alertBox" class="alert"></div>
        
        <div class="input-group">
            <label>Email Address</label>
            <div class="input-field"><i class="fas fa-envelope"></i><input type="email" id="email" placeholder="example@email.com"></div>
        </div>
        <div class="input-group">
            <label>Password</label>
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter password">
                <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Toggle password visibility">
                    <i class="far fa-eye-slash"></i>
                </button>
            </div>
        </div>
        
        <button class="btn" onclick="handleLogin()">Sign In</button>
        
        <div class="auth-links"><a href="forgot-password.html">Forgot Password?</a></div>
        
        <div class="divider"><div class="divider-line"></div><div class="divider-text">New user?</div><div class="divider-line"></div></div>
        <button class="btn btn-secondary" onclick="window.location.href='register.html'">Create Account</button>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './js/firebase-config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getDatabase, ref, get, set, onValue } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    
    const COMPANY_ASSETS_PATH = 'companyAssets';
    const headerTitleSpan = document.getElementById('headerTitle');
    const headerSubtitleSpan = document.getElementById('headerSubtitle');
    const headerLogoDiv = document.getElementById('headerLogo');
    
    // ========== LOAD GLOBAL BRANDING ==========
    async function loadGlobalBranding() {
        try {
            const brandSnap = await get(ref(db, `${COMPANY_ASSETS_PATH}/branding`));
            if (brandSnap.exists()) {
                const brand = brandSnap.val();
                if (headerTitleSpan && brand.title) headerTitleSpan.textContent = brand.title;
                if (headerSubtitleSpan && brand.subtitle) headerSubtitleSpan.textContent = brand.subtitle;
            } else {
                headerTitleSpan.textContent = 'SP CONSTRUCTION';
                headerSubtitleSpan.textContent = 'BUILDING DREAMS';
            }
        } catch(err) { console.warn(err); }
    }
    
    async function loadCompanyLogo() {
        try {
            const logoSnap = await get(ref(db, `${COMPANY_ASSETS_PATH}/footerLogo`));
            if (logoSnap.exists() && logoSnap.val() && logoSnap.val().startsWith('data:image')) {
                headerLogoDiv.innerHTML = `<img src="${logoSnap.val()}" alt="Company Logo">`;
            } else {
                headerLogoDiv.innerHTML = `<span>SP</span>`;
            }
        } catch(err) { console.warn(err); }
    }
    
    // Load branding on page load
    loadGlobalBranding();
    loadCompanyLogo();
    
    // Optional: listen for real-time changes (if admin updates branding while user is on login page)
    onValue(ref(db, `${COMPANY_ASSETS_PATH}/branding`), (snapshot) => {
        if (snapshot.exists()) {
            const brand = snapshot.val();
            if (headerTitleSpan && brand.title) headerTitleSpan.textContent = brand.title;
            if (headerSubtitleSpan && brand.subtitle) headerSubtitleSpan.textContent = brand.subtitle;
        } else {
            headerTitleSpan.textContent = 'SP CONSTRUCTION';
            headerSubtitleSpan.textContent = 'BUILDING DREAMS';
        }
    });
    
    onValue(ref(db, `${COMPANY_ASSETS_PATH}/footerLogo`), (snapshot) => {
        if (snapshot.val() && snapshot.val().startsWith('data:image')) {
            headerLogoDiv.innerHTML = `<img src="${snapshot.val()}" alt="Company Logo">`;
        } else {
            headerLogoDiv.innerHTML = `<span>SP</span>`;
        }
    });
    // ========== END BRANDING ==========
    
    function showAlert(message, type) {
        const alert = document.getElementById('alertBox');
        alert.textContent = message;
        alert.className = `alert alert-${type} show`;
        setTimeout(() => alert.classList.remove('show'), 5000);
    }
    
    function showLoading(show) {
        const loading = document.getElementById('loading');
        if (show) loading.classList.add('show');
        else loading.classList.remove('show');
    }
    
    window.togglePassword = function() {
        const field = document.getElementById('password');
        const toggleBtn = field.parentElement.querySelector('.toggle-password i');
        if (field.type === 'password') {
            field.type = 'text';
            toggleBtn.classList.remove('fa-eye-slash');
            toggleBtn.classList.add('fa-eye');
        } else {
            field.type = 'password';
            toggleBtn.classList.remove('fa-eye');
            toggleBtn.classList.add('fa-eye-slash');
        }
    };
    
    window.handleLogin = async function() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            showAlert('Please enter email and password', 'error');
            return;
        }
        
        showLoading(true);
        
        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            
            if (!user.emailVerified) {
                showAlert('❌ Your email is not verified! Please check your inbox and click the verification link.', 'error');
                showLoading(false);
                return;
            }
            
            const snapshot = await get(ref(db, `users/${user.uid}`));
            let userData = snapshot.val();
            let userRole = 'user';
            let isAdmin = false;
            
            if (userData) {
                userRole = userData.role || 'user';
                isAdmin = userRole === 'admin';
            } else {
                const allUsersSnap = await get(ref(db, 'users'));
                const userCount = allUsersSnap.exists() ? Object.keys(allUsersSnap.val()).length : 0;
                
                if (userCount === 0) {
                    userRole = 'admin';
                    isAdmin = true;
                    userData = {
                        uid: user.uid,
                        email: user.email,
                        fullName: user.displayName || email.split('@')[0],
                        emailVerified: user.emailVerified,
                        registeredAt: new Date().toISOString(),
                        role: 'admin',
                        isAdmin: true
                    };
                    await set(ref(db, `users/${user.uid}`), userData);
                } else {
                    userData = {
                        uid: user.uid,
                        email: user.email,
                        fullName: user.displayName || email.split('@')[0],
                        emailVerified: user.emailVerified,
                        registeredAt: new Date().toISOString(),
                        role: 'user',
                        isAdmin: false
                    };
                    await set(ref(db, `users/${user.uid}`), userData);
                }
            }
            
            localStorage.setItem('currentUser', JSON.stringify(userData));
            localStorage.setItem('currentUserUID', user.uid);
            localStorage.setItem('userRole', userRole);
            
            showAlert('Login successful! Redirecting...', 'success');
            
            setTimeout(() => {
                if (isAdmin) {
                    window.location.href = 'index.html';
                } else {
                    window.location.href = '../index-user.html';
                }
            }, 1000);
            
        } catch (error) {
            showLoading(false);
            let message = 'Login failed!';
            if (error.code === 'auth/invalid-credential') message = 'Invalid email or password';
            else if (error.code === 'auth/user-not-found') message = 'No account found with this email';
            else if (error.code === 'auth/wrong-password') message = 'Incorrect password';
            else if (error.code === 'auth/too-many-requests') message = 'Too many failed attempts. Try again later.';
            showAlert(message, 'error');
            console.error("Login error:", error);
        }
    };
</script>
</body>
</html>
