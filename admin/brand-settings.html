<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Brand Settings | SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module">
        import { firebaseConfig } from './js/firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        
        // DOM elements – Logo
        const logoImg = document.getElementById('logoImg');
        const logoPlaceholder = document.getElementById('logoPlaceholder');
        const editLogoBtn = document.getElementById('editLogoBtn');
        const logoUpload = document.getElementById('logoUpload');
        const removeLogoBtn = document.getElementById('removeLogoBtn');
        
        // Text branding
        const titleInput = document.getElementById('brandTitle');
        const subtitleInput = document.getElementById('brandSubtitle');
        const saveBtn = document.getElementById('saveBtn');
        const resetBtn = document.getElementById('resetBtn');
        
        // PDF Header Image (banner for reports)
        const pdfHeaderImg = document.getElementById('pdfHeaderImg');
        const pdfHeaderPlaceholder = document.getElementById('pdfHeaderPlaceholder');
        const editPdfHeaderBtn = document.getElementById('editPdfHeaderBtn');
        const pdfHeaderUpload = document.getElementById('pdfHeaderUpload');
        const removePdfHeaderBtn = document.getElementById('removePdfHeaderBtn');
        
        const toast = document.getElementById('toast');
        
        let currentUser = null;
        const COMPANY_ASSETS = 'companyAssets';
        const LOGO_PATH = `${COMPANY_ASSETS}/footerLogo`;
        const BRANDING_PATH = `${COMPANY_ASSETS}/branding`;      // global title/subtitle
        const PDF_HEADER_PATH = `${COMPANY_ASSETS}/pdfHeaderImage`;
        
        function showToast(msg, isError = false) {
            toast.textContent = msg;
            toast.className = `toast ${isError ? 'error' : 'success'} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Load all global assets
        async function loadGlobalBranding() {
            try {
                const [logoSnap, textSnap, pdfHeaderSnap] = await Promise.all([
                    get(ref(db, LOGO_PATH)),
                    get(ref(db, BRANDING_PATH)),
                    get(ref(db, PDF_HEADER_PATH))
                ]);
                // Logo
                if (logoSnap.exists() && logoSnap.val()?.startsWith('data:image')) {
                    logoImg.src = logoSnap.val();
                    logoImg.style.display = 'block';
                    logoPlaceholder.style.display = 'none';
                } else {
                    logoImg.style.display = 'none';
                    logoPlaceholder.style.display = 'flex';
                }
                // Title & Subtitle
                if (textSnap.exists()) {
                    const data = textSnap.val();
                    titleInput.value = data.title || '';
                    subtitleInput.value = data.subtitle || '';
                } else {
                    titleInput.value = '';
                    subtitleInput.value = '';
                }
                // PDF Header Image
                if (pdfHeaderSnap.exists() && pdfHeaderSnap.val()?.startsWith('data:image')) {
                    pdfHeaderImg.src = pdfHeaderSnap.val();
                    pdfHeaderImg.style.display = 'block';
                    pdfHeaderPlaceholder.style.display = 'none';
                } else {
                    pdfHeaderImg.style.display = 'none';
                    pdfHeaderPlaceholder.style.display = 'flex';
                }
            } catch (err) {
                console.error(err);
            }
        }
        
        // Save text branding (global for all admins)
        saveBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            const title = titleInput.value.trim();
            const subtitle = subtitleInput.value.trim();
            if (!title && !subtitle) {
                showToast('Please enter title or subtitle', true);
                return;
            }
            try {
                await set(ref(db, BRANDING_PATH), { title, subtitle, updatedAt: Date.now() });
                showToast('✓ Branding updated for all admins');
            } catch (err) {
                showToast('Error: ' + err.message, true);
            }
        });
        
        // Reset text to default
        resetBtn.addEventListener('click', async () => {
            if (!currentUser) return;
            if (confirm('Reset to default "SP CONSTRUCTION" / "ADMIN DASHBOARD"?')) {
                try {
                    await set(ref(db, BRANDING_PATH), null);
                    titleInput.value = '';
                    subtitleInput.value = '';
                    showToast('Reset to default');
                } catch (err) {
                    showToast('Error: ' + err.message, true);
                }
            }
        });
        
        // Logo upload (company logo)
        editLogoBtn.addEventListener('click', () => logoUpload.click());
        logoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showToast('Only images allowed', true);
                return;
            }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                try {
                    await set(ref(db, LOGO_PATH), base64);
                    logoImg.src = base64;
                    logoImg.style.display = 'block';
                    logoPlaceholder.style.display = 'none';
                    showToast('✓ Logo updated for all admins');
                    logoUpload.value = '';
                } catch (err) {
                    showToast('Upload failed: ' + err.message, true);
                }
            };
            reader.readAsDataURL(file);
        });
        
        removeLogoBtn.addEventListener('click', async () => {
            if (confirm('Remove logo?')) {
                try {
                    await set(ref(db, LOGO_PATH), null);
                    logoImg.style.display = 'none';
                    logoPlaceholder.style.display = 'flex';
                    showToast('Logo removed');
                } catch (err) {
                    showToast('Error: ' + err.message, true);
                }
            }
        });
        
        // PDF Header Image upload (banner for reports)
        editPdfHeaderBtn.addEventListener('click', () => pdfHeaderUpload.click());
        pdfHeaderUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) {
                showToast('Only images allowed', true);
                return;
            }
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const base64 = ev.target.result;
                try {
                    await set(ref(db, PDF_HEADER_PATH), base64);
                    pdfHeaderImg.src = base64;
                    pdfHeaderImg.style.display = 'block';
                    pdfHeaderPlaceholder.style.display = 'none';
                    showToast('✓ PDF header banner updated');
                    pdfHeaderUpload.value = '';
                } catch (err) {
                    showToast('Upload failed: ' + err.message, true);
                }
            };
            reader.readAsDataURL(file);
        });
        
        removePdfHeaderBtn.addEventListener('click', async () => {
            if (confirm('Remove PDF header banner?')) {
                try {
                    await set(ref(db, PDF_HEADER_PATH), null);
                    pdfHeaderImg.style.display = 'none';
                    pdfHeaderPlaceholder.style.display = 'flex';
                    showToast('PDF header banner removed');
                } catch (err) {
                    showToast('Error: ' + err.message, true);
                }
            }
        });
        
        // Auth & admin check
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const userSnap = await get(ref(db, `users/${user.uid}`));
                const userData = userSnap.val();
                if (!userData || (userData.role !== 'admin' && userData.isAdmin !== true)) {
                    alert('Access Denied');
                    window.location.href = 'index-user.html';
                    return;
                }
                currentUser = user;
                await loadGlobalBranding();
            } catch (err) {
                console.error(err);
                window.location.href = 'login.html';
            }
        });
    </script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #eef2f6, #f8fafc);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 1.5rem;
            text-align: center;
            color: white;
        }
        .card-header i {
            font-size: 2rem;
            background: #f59e0b;
            padding: 0.7rem;
            border-radius: 1.2rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }
        .card-header h2 { font-size: 1.3rem; font-weight: 700; }
        .card-body { padding: 1.8rem; }
        
        /* Logo section */
        .logo-section, .pdf-header-section {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
            position: relative;
        }
        .logo-wrapper, .pdf-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
        }
        .pdf-wrapper {
            width: 100%;
            height: auto;
            max-width: 100%;
        }
        .logo-circle, .pdf-circle {
            background: #f1f5f9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e2e8f0;
            overflow: hidden;
            width: 100px;
            height: 100px;
        }
        .pdf-circle {
            border-radius: 16px;
            width: 100%;
            height: auto;
            min-height: 80px;
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
        }
        .logo-circle img, .pdf-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-placeholder, .pdf-placeholder {
            font-size: 2rem;
            font-weight: 800;
            color: #f59e0b;
            text-align: center;
        }
        .pdf-placeholder {
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .edit-icon {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #f59e0b;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .pdf-wrapper .edit-icon {
            bottom: 5px;
            right: 5px;
        }
        .remove-link { text-align: center; margin: 0.5rem 0 1.5rem; font-size: 0.7rem; }
        .remove-link span { color: #ef4444; cursor: pointer; text-decoration: underline; }
        .section-divider {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 1.5rem 0 1rem;
        }
        .section-divider hr {
            flex: 1;
            border: none;
            height: 1px;
            background: #e2e8f0;
        }
        .section-divider i {
            color: #f59e0b;
            font-size: 0.8rem;
        }
        .form-group { margin-bottom: 1.2rem; }
        label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: #475569; display: block; margin-bottom: 0.3rem; }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 0.9rem;
        }
        input:focus { outline: none; border-color: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
        .button-group { display: flex; gap: 0.8rem; margin: 1.5rem 0 1rem; }
        button {
            flex: 1;
            padding: 0.7rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-save { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-reset { background: #f1f5f9; color: #475569; }
        .toast {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.2s;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; visibility: visible; }
        .toast.success { background: #059669; }
        .toast.error { background: #dc2626; }
        .back-link { text-align: center; margin-top: 1rem; }
        .back-link a { font-size: 0.75rem; color: #64748b; text-decoration: none; }
        .back-link a:hover { color: #f59e0b; }
        @media (max-width: 480px) {
            .card-body { padding: 1.2rem; }
            .button-group { flex-direction: column; }
            .toast { white-space: normal; text-align: center; width: 80%; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header"><i class="fas fa-brush"></i><h2>Brand Settings</h2></div>
    <div class="card-body">
        <!-- Company Logo -->
        <div class="logo-section">
            <div class="logo-wrapper">
                <div class="logo-circle">
                    <img id="logoImg" style="display: none;" alt="Logo">
                    <div id="logoPlaceholder" class="logo-placeholder">SP</div>
                </div>
                <div class="edit-icon" id="editLogoBtn"><i class="fas fa-pencil-alt"></i></div>
                <input type="file" id="logoUpload" accept="image/*" style="display: none;">
            </div>
        </div>
        <div class="remove-link"><span id="removeLogoBtn"><i class="fas fa-trash-alt"></i> Remove Logo</span></div>
        
        <!-- PDF Header Banner (appears on PDF reports) -->
        <div class="section-divider">
            <i class="fas fa-file-pdf"></i> <span>PDF Report Banner</span> <hr>
        </div>
        <div class="pdf-header-section">
            <div class="pdf-wrapper">
                <div class="pdf-circle">
                    <img id="pdfHeaderImg" style="display: none;" alt="PDF Banner">
                    <div id="pdfHeaderPlaceholder" class="pdf-placeholder">
                        <i class="fas fa-image" style="font-size: 1.5rem;"></i>
                        <span>800*150</span>
                    </div>
                </div>
                <div class="edit-icon" id="editPdfHeaderBtn"><i class="fas fa-pencil-alt"></i></div>
                <input type="file" id="pdfHeaderUpload" accept="image/*" style="display: none;">
            </div>
        </div>
        <div class="remove-link"><span id="removePdfHeaderBtn"><i class="fas fa-trash-alt"></i> Remove Banner</span></div>
        
        <!-- Title & Subtitle -->
        <div class="section-divider">
            <i class="fas fa-heading"></i> <span>Header Text</span> <hr>
        </div>
        <div class="form-group"><label>Title</label><input type="text" id="brandTitle" placeholder="e.g., SP CONSTRUCTION"></div>
        <div class="form-group"><label>Subtitle</label><input type="text" id="brandSubtitle" placeholder="e.g., ADMIN DASHBOARD"></div>
        
        <div class="button-group">
            <button class="btn-save" id="saveBtn"><i class="fas fa-save"></i> Save</button>
            <button class="btn-reset" id="resetBtn"><i class="fas fa-undo-alt"></i> Reset</button>
        </div>
        <div class="back-link"><a href="dashboard.html"><i class="fas fa-arrow-left"></i> Back to Dashboard</a></div>
    </div>
</div>
<div id="toast" class="toast"></div>
</body>
</html>
