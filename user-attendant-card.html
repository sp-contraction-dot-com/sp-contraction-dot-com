<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>My Attendance Card - SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAT3LQUFBhiZINM9NZTulX7umf-P1Y6i2I",
            authDomain: "sp-build-official.firebaseapp.com",
            projectId: "sp-build-official",
            storageBucket: "sp-build-official.firebasestorage.app",
            messagingSenderId: "377403616440",
            appId: "1:377403616440:web:bfae56e748f05de22a184d",
            measurementId: "G-P319FN0C0N",
            databaseURL: "https://sp-build-official-default-rtdb.firebaseio.com/"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.ref = ref;
        window.get = get;
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* Header */
        .header {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo-section { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-icon span { font-size: 1.3rem; font-weight: 800; color: white; }
        .logo-text h1 { font-size: 1rem; font-weight: 700; color: white; }
        .logo-text p { font-size: 0.45rem; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
        .user-info {
            background: rgba(255,255,255,0.1);
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .user-info i { margin-right: 8px; color: #f59e0b; }
        .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
            text-decoration: none;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn:hover { background: #f59e0b; border-color: transparent; transform: translateY(-2px); }
        
        /* Search Card */
        .search-card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .search-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #1e293b;
            border-left: 4px solid #f59e0b;
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .auto-badge {
            background: #fef3c7;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #d97706;
        }
        .mode-toggle {
            display: flex;
            gap: 8px;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 40px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: transparent;
            color: #64748b;
            font-size: 0.8rem;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 2px 8px rgba(245,158,11,0.3);
        }
        .search-box {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .search-input-group {
            flex: 1;
            min-width: 150px;
        }
        .search-input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 5px;
        }
        .search-input-group select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 0.85rem;
            background: white;
        }
        .search-input-group select:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .search-input-group select:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }
        .search-btn {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            border: none;
            padding: 0 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            height: 42px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .search-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245,158,11,0.4); }
        
        .card-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }
        
        /* ========== MODERN ATTENDANCE CARD ========== */
        .attendance-card {
            width: 580px;
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transition: transform 0.3s ease;
        }
        .attendance-card:hover { transform: translateY(-5px); }
        
        /* Card Header */
        .card-header {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            padding: 20px 24px;
            text-align: center;
            position: relative;
        }
        .company-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .brand-logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .brand-logo span { font-size: 1.2rem; font-weight: 800; color: white; }
        .brand-text h2 { font-size: 1rem; font-weight: 700; color: white; }
        .brand-text p { font-size: 0.45rem; color: #fcd34d; letter-spacing: 1px; }
        .card-badge {
            position: absolute;
            top: 12px;
            right: 16px;
            background: rgba(245,158,11,0.2);
            border: 1px solid rgba(245,158,11,0.5);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.55rem;
            font-weight: 600;
            color: #fcd34d;
        }
        
        /* Card Body */
        .card-body {
            padding: 24px;
        }
        
        /* Profile Section */
        .profile-section {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
        }
        .profile-avatar {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #fef3c7, #fffbeb);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #f59e0b;
            overflow: hidden;
        }
        .profile-avatar i { font-size: 2.5rem; color: #f59e0b; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { flex: 1; }
        .worker-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .worker-id {
            display: inline-block;
            background: #fef3c7;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #d97706;
            font-family: monospace;
        }
        .contact-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.75rem;
            color: #64748b;
        }
        .contact-info i { color: #f59e0b; width: 20px; }
        
        /* Month Badge */
        .month-badge {
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            border-radius: 30px;
            padding: 8px 16px;
            text-align: center;
            margin-bottom: 20px;
        }
        .month-badge span { font-size: 0.75rem; font-weight: 700; color: #0369a1; }
        .month-badge i { margin-right: 6px; }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            transition: all 0.3s;
        }
        .stat-box:hover { transform: translateY(-3px); background: #fef3c7; }
        .stat-number {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1e293b;
        }
        .stat-label {
            font-size: 0.6rem;
            color: #64748b;
            font-weight: 500;
            margin-top: 4px;
        }
        
        /* Financial Row */
        .financial-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .financial-box {
            border-radius: 16px;
            padding: 12px;
            text-align: center;
        }
        .financial-box.earnings { background: linear-gradient(135deg, #f0fdf4, #dcfce7); border-left: 3px solid #22c55e; }
        .financial-box.paid { background: linear-gradient(135deg, #eff6ff, #dbeafe); border-left: 3px solid #3b82f6; }
        .financial-box.due { background: linear-gradient(135deg, #fff7ed, #fffbeb); border-left: 3px solid #f59e0b; }
        .financial-label {
            font-size: 0.6rem;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: 500;
        }
        .financial-amount {
            font-size: 1rem;
            font-weight: 800;
            color: #1e293b;
        }
        
        /* Hours Row */
        .hours-row {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .hours-row i { color: #f59e0b; font-size: 1rem; }
        .hours-text { font-size: 0.75rem; color: #475569; }
        .hours-text strong { color: #f59e0b; }
        
        /* Address */
        .address-row {
            background: #f8fafc;
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .address-row i { color: #f59e0b; }
        .address-text { font-size: 0.65rem; color: #64748b; line-height: 1.4; }
        
        /* Card Footer */
        .card-footer {
            background: #f8fafc;
            padding: 12px 24px;
            text-align: center;
            border-top: 1px solid #eef2f6;
        }
        .card-footer p { font-size: 0.55rem; color: #94a3b8; }
        
        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        .download-btn, .print-btn {
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
        }
        .download-btn {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 2px 8px rgba(34,197,94,0.3);
        }
        .print-btn {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 2px 8px rgba(59,130,246,0.3);
        }
        .download-btn:hover, .print-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }
        
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .loading.show { display: flex; }
        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid rgba(245,158,11,0.2);
            border-top: 4px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.8rem;
            border-left: 3px solid #dc2626;
        }
        .error-msg.show { display: block; }
        
        .no-data-card {
            background: white;
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            color: #64748b;
        }
        
        @media (max-width: 620px) {
            .attendance-card { width: 95%; }
            .profile-section { flex-direction: column; align-items: center; text-align: center; }
            .contact-info { justify-content: center; }
            .stats-row, .financial-row { gap: 8px; }
            .stat-number { font-size: 1.2rem; }
            .search-box { flex-direction: column; }
            .search-btn { width: 100%; justify-content: center; margin-top: 10px; }
            .header { flex-direction: column; text-align: center; }
            .nav-buttons { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="container">
    <div class="header">
        <div class="logo-section">
            <div class="logo-icon" id="headerLogo"><span>SP</span></div>
            <div class="logo-text">
                <h1>SP CONSTRUCTION</h1>
                <p>ATTENDANCE CARD</p>
            </div>
        </div>
        <div class="user-info" id="userInfoDisplay"><i class="fas fa-user-circle"></i> <span id="userName">Loading...</span></div>
        <div class="nav-buttons">
            <a href="attendance.html" class="nav-btn"><i class="fas fa-calendar-check"></i> Attendance</a>
            <a href="profile.html" class="nav-btn"><i class="fas fa-user"></i> Profile</a>
            <a href="dashboard.html" class="nav-btn"><i class="fas fa-home"></i> Home</a>
            <button class="nav-btn" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <div class="search-card">
        <div class="search-title">
            <span><i class="fas fa-id-card"></i> My Attendance Card</span>
            <span class="auto-badge" id="modeBadge">🤖 Auto Mode</span>
        </div>
        
        <div class="mode-toggle">
            <button class="mode-btn active" id="autoModeBtn" onclick="setMode('auto')">
                <i class="fas fa-magic"></i> Auto Mode
            </button>
            <button class="mode-btn" id="manualModeBtn" onclick="setMode('manual')">
                <i class="fas fa-calendar-alt"></i> Manual Mode
            </button>
        </div>
        
        <div class="search-box">
            <div class="search-input-group">
                <label><i class="fas fa-calendar"></i> Select Month</label>
                <select id="monthSelect" disabled>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>
            <div class="search-input-group">
                <label><i class="fas fa-calendar"></i> Select Year</label>
                <select id="yearSelect" disabled></select>
            </div>
            <button class="search-btn" onclick="generateMyCard()"><i class="fas fa-sync-alt"></i> Generate My Card</button>
        </div>
    </div>
    
    <div id="cardDisplayArea" class="card-container">
        <div class="no-data-card">
            <i class="fas fa-id-card" style="font-size: 3rem; color: #f59e0b; margin-bottom: 15px; opacity: 0.6;"></i>
            <h3>My Attendance Card</h3>
            <p style="margin-top: 8px;">Click "Generate My Card" to view your attendance report</p>
        </div>
    </div>
    
    <div id="actionButtons" class="action-buttons" style="display: none;">
        <button class="download-btn" onclick="downloadCardAsImage()"><i class="fas fa-download"></i> Download as Image</button>
        <button class="print-btn" onclick="printCard()"><i class="fas fa-print"></i> Print Card</button>
    </div>
</div>

<script type="module">
    let allAttendance = [];
    let currentUserData = null;
    let currentUserUID = null;
    let currentMode = 'auto';
    let currentMonth = new Date().getMonth() + 1;
    let currentYear = new Date().getFullYear();
    let companyLogo = null;
    
    const CURRENT_YEAR = new Date().getFullYear();
    const CURRENT_MONTH = new Date().getMonth() + 1;
    const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const START_YEAR = 2026;
    const END_YEAR = 2075;
    
    function showLoading(show) {
        document.getElementById('loading').classList.toggle('show', show);
    }
    
    function showError(message) {
        const el = document.getElementById('errorMsg');
        el.textContent = message;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 5000);
    }
    
    window.handleLogout = async function() {
        showLoading(true);
        try {
            await window.signOut(window.auth);
            window.location.href = 'login.html';
        } catch (error) {
            showLoading(false);
            showError('Failed to logout');
        }
    };
    
    async function loadCompanyLogo(uid) {
        if (!uid) return;
        try {
            const logoRef = window.ref(window.db, `users/${uid}/footerLogo`);
            const snapshot = await window.get(logoRef);
            if (snapshot.exists() && snapshot.val()?.startsWith('data:image')) {
                companyLogo = snapshot.val();
                const headerLogo = document.getElementById('headerLogo');
                if (headerLogo) headerLogo.innerHTML = `<img src="${companyLogo}" alt="Logo">`;
            }
        } catch(e) { console.warn(e); }
    }
    
    function populateYearSelect() {
        const yearSelect = document.getElementById('yearSelect');
        yearSelect.innerHTML = '';
        for (let year = START_YEAR; year <= END_YEAR; year++) {
            const option = document.createElement('option');
            option.value = year;
            option.textContent = year;
            if (year === CURRENT_YEAR) option.selected = true;
            yearSelect.appendChild(option);
        }
    }
    
    window.setMode = function(mode) {
        currentMode = mode;
        const autoBtn = document.getElementById('autoModeBtn');
        const manualBtn = document.getElementById('manualModeBtn');
        const monthSelect = document.getElementById('monthSelect');
        const yearSelect = document.getElementById('yearSelect');
        const modeBadge = document.getElementById('modeBadge');
        
        if (mode === 'auto') {
            autoBtn.classList.add('active');
            manualBtn.classList.remove('active');
            monthSelect.disabled = true;
            yearSelect.disabled = true;
            modeBadge.innerHTML = '🤖 Auto Mode: ' + monthNames[CURRENT_MONTH - 1] + ' ' + CURRENT_YEAR;
            currentMonth = CURRENT_MONTH;
            currentYear = CURRENT_YEAR;
            if (currentUserData) generateMyCard();
        } else {
            autoBtn.classList.remove('active');
            manualBtn.classList.add('active');
            monthSelect.disabled = false;
            yearSelect.disabled = false;
            modeBadge.innerHTML = '📅 Manual Mode: Select Month & Year';
            currentMonth = parseInt(monthSelect.value);
            currentYear = parseInt(yearSelect.value);
            if (currentUserData) generateMyCard();
        }
    };
    
    async function generateMyCard() {
        if (!currentUserData) {
            showError('User data not loaded. Please wait or refresh the page.');
            return;
        }
        
        if (currentMode === 'auto') {
            currentMonth = CURRENT_MONTH;
            currentYear = CURRENT_YEAR;
        } else {
            currentMonth = parseInt(document.getElementById('monthSelect').value);
            currentYear = parseInt(document.getElementById('yearSelect').value);
        }
        
        showLoading(true);
        const stats = calculateMonthlyStats(currentUserData.userId, currentMonth, currentYear);
        renderCard(currentUserData, stats, currentMonth, currentYear);
        showLoading(false);
        document.getElementById('actionButtons').style.display = 'flex';
    }
    
    async function loadAttendance() {
        try {
            const snapshot = await window.get(window.ref(window.db, 'attendance'));
            if (snapshot.exists()) {
                allAttendance = Object.values(snapshot.val());
            }
        } catch (error) {
            console.error("Error loading attendance:", error);
        }
    }
    
    async function loadCurrentUserData() {
        const user = window.auth.currentUser;
        if (!user) return null;
        
        try {
            const snapshot = await window.get(window.ref(window.db, 'users'));
            if (snapshot.exists()) {
                const users = snapshot.val();
                for (let key in users) {
                    if (users[key].email === user.email) {
                        currentUserData = users[key];
                        currentUserUID = key;
                        break;
                    }
                }
            }
            if (currentUserData) {
                const displayName = currentUserData.fullName || `${currentUserData.firstName} ${currentUserData.lastName}`;
                document.getElementById('userName').textContent = displayName;
                document.getElementById('userInfoDisplay').innerHTML = `<i class="fas fa-user-circle"></i> ${displayName}`;
            } else {
                document.getElementById('userName').textContent = user.email?.split('@')[0] || 'User';
            }
            return currentUserData;
        } catch (error) {
            console.error("Error loading user data:", error);
            return null;
        }
    }
    
    function calculateMonthlyStats(workerId, month, year) {
        const monthStr = month.toString().padStart(2, '0');
        const yearStr = year.toString();
        
        const monthlyRecords = allAttendance.filter(record => {
            if (!record.date) return false;
            const [recordYear, recordMonth] = record.date.split('-');
            return record.workerId === workerId && recordYear === yearStr && recordMonth === monthStr;
        });
        
        let presentDays = 0, absentDays = 0, halfDays = 0, totalHours = 0, totalEarnings = 0, totalPaid = 0;
        
        monthlyRecords.forEach(record => {
            if (record.status === 'present') presentDays++;
            else if (record.status === 'absent') absentDays++;
            else if (record.status === 'halfday') halfDays++;
            totalHours += record.hours || 0;
            totalEarnings += record.earnings || 0;
            totalPaid += record.paid || 0;
        });
        
        const totalWorkingDays = presentDays + halfDays;
        const totalDue = totalEarnings - totalPaid;
        
        return {
            presentDays, absentDays, halfDays, totalWorkingDays,
            totalHours: totalHours.toFixed(1),
            totalEarnings: totalEarnings.toFixed(0),
            totalPaid: totalPaid.toFixed(0),
            totalDue: totalDue.toFixed(0),
            totalRecords: monthlyRecords.length
        };
    }
    
    function formatNumber(n) { return Math.round(parseFloat(n) || 0).toLocaleString('en-IN'); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    window.downloadCardAsImage = async function() {
        const card = document.getElementById('attendanceCard');
        if (!card) { showError('No card to download'); return; }
        showLoading(true);
        try {
            const canvas = await html2canvas(card, { scale: 3, backgroundColor: '#ffffff' });
            const link = document.createElement('a');
            link.download = `${currentUserData?.firstName}_${currentUserData?.lastName}_Attendance_Card.png`;
            link.href = canvas.toDataURL();
            link.click();
        } catch(e) { showError('Download failed'); }
        showLoading(false);
    };
    
    window.printCard = function() {
        const card = document.getElementById('attendanceCard');
        if (!card) { showError('No card to print'); return; }
        const win = window.open('', '_blank');
        win.document.write(`
            <html><head><title>Attendance Card</title>
            <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
            <style>
                body{font-family:'Inter',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f2f5;padding:20px;}
                @media print{body{background:white;padding:0;}}
                .brand-logo img, .logo-icon img { width:100%; height:100%; object-fit:cover; }
            </style>
            </head><body>${card.outerHTML}<script>window.onload=function(){setTimeout(function(){window.print();setTimeout(function(){window.close();},500);},500);}<\/script></body></html>
        `);
        win.document.close();
    };
    
    document.getElementById('monthSelect').addEventListener('change', function() {
        if (currentMode === 'manual' && currentUserData) {
            currentMonth = parseInt(this.value);
            generateMyCard();
        }
    });
    
    document.getElementById('yearSelect').addEventListener('change', function() {
        if (currentMode === 'manual' && currentUserData) {
            currentYear = parseInt(this.value);
            generateMyCard();
        }
    });
    
    populateYearSelect();
    
    window.onAuthStateChanged(window.auth, async (user) => {
        if (!user) {
            window.location.href = 'login.html';
        } else {
            showLoading(true);
            await loadCompanyLogo(user.uid);
            await loadCurrentUserData();
            await loadAttendance();
            showLoading(false);
            generateMyCard();
        }
    });
</script>
