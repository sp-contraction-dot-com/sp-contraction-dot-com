<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Login - SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module">
        import { firebaseConfig } from './admin/js/firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.ref = ref;
        window.get = get;
        window.set = set;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .auth-container { 
            max-width: 520px; 
            width: 100%; 
        }
        
        /* ===== LOGO SECTION ===== */
        .logo-section { 
            text-align: center; 
            margin-bottom: 32px; 
        }
        .logo-wrapper {
            display: inline-flex; 
            align-items: center; 
            gap: 14px;
            background: white;
            padding: 14px 32px; 
            border-radius: 60px;
            border: 1px solid #e8ecf1;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .logo-icon { 
            width: 52px; 
            height: 52px; 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-icon span { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: white; 
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-text h1 { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: #0f172a;
            line-height: 1.2;
        }
        .logo-text p { 
            font-size: 0.6rem; 
            color: #f59e0b;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        /* ===== AUTH CARD ===== */
        .auth-card { 
            background: white; 
            border-radius: 32px; 
            padding: 40px 36px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #e8ecf1;
        }
        .auth-header { 
            text-align: center; 
            margin-bottom: 32px; 
        }
        .auth-header h2 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: #1e293b; 
        }
        
        /* ===== INPUT ===== */
        .input-group { 
            margin-bottom: 22px; 
        }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #334155; 
            margin-bottom: 8px; 
        }
        .input-field { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        .input-field i:not(.toggle-password) { 
            position: absolute; 
            left: 18px; 
            color: #94a3b8; 
            z-index: 2; 
            font-size: 1rem;
        }
        .input-field input { 
            width: 100%; 
            padding: 16px 50px 16px 50px; 
            border: 2px solid #e8ecf1; 
            border-radius: 18px; 
            font-size: 1rem; 
            background: #f8fafc;
            transition: all 0.3s;
        }
        .input-field input:focus { 
            outline: none; 
            border-color: #f59e0b; 
            box-shadow: 0 0 0 4px rgba(245,158,11,0.08);
            background: white;
        }
        .input-field input::placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .toggle-password {
            position: absolute; 
            right: 18px; 
            background: transparent; 
            border: none;
            cursor: pointer; 
            color: #94a3b8; 
            font-size: 1.1rem; 
            z-index: 2;
            padding: 4px;
        }
        .toggle-password:hover { color: #f59e0b; }
        
        /* ===== BUTTONS ===== */
        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 40px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 12px; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: white; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(245,158,11,0.35); 
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary { 
            background: transparent; 
            border: 2px solid #e8ecf1; 
            color: #334155; 
            margin-top: 14px; 
        }
        .btn-secondary:hover { 
            background: #f8fafc; 
            transform: translateY(-2px); 
        }
        
        /* ===== LINKS ===== */
        .auth-links { 
            text-align: center; 
            margin-top: 18px; 
        }
        .auth-links a { 
            color: #f59e0b; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 500;
        }
        .auth-links a:hover { 
            text-decoration: underline; 
        }
        
        /* ===== DIVIDER ===== */
        .divider { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            margin: 22px 0; 
        }
        .divider-line { 
            flex: 1; 
            height: 1px; 
            background: #e8ecf1; 
        }
        .divider-text { 
            font-size: 0.8rem; 
            color: #94a3b8; 
            font-weight: 500;
            white-space: nowrap;
        }
        
        /* ===== ALERT ===== */
        .alert { 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: 0.85rem; 
            margin-bottom: 24px; 
            display: none; 
            font-weight: 500;
            line-height: 1.5;
        }
        .alert-error { 
            background: #fef2f2; 
            color: #dc2626; 
            border: 1px solid #fecaca; 
        }
        .alert-success { 
            background: #f0fdf4; 
            color: #16a34a; 
            border: 1px solid #bbf7d0; 
        }
        .alert.show { 
            display: block; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== LOADING ===== */
        .loading { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center; 
            align-items: center; 
            z-index: 999; 
        }
        .loading.show { 
            display: flex; 
        }
        .spinner { 
            width: 48px; 
            height: 48px; 
            border: 4px solid rgba(255,255,255,0.2); 
            border-top: 4px solid #f59e0b; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        @media (max-width: 480px) {
            body { padding: 16px; }
            .auth-card { padding: 28px 20px; }
            .logo-wrapper { padding: 10px 20px; gap: 10px; }
            .logo-icon { width: 42px; height: 42px; }
            .logo-icon span { font-size: 1.3rem; }
            .logo-text h1 { font-size: 1.1rem; }
            .auth-header h2 { font-size: 1.4rem; }
            .btn { padding: 14px; font-size: 0.9rem; }
            .input-field input { padding: 14px 46px 14px 46px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="auth-container">
    <!-- Logo Section -->
    <div class="logo-section">
        <div class="logo-wrapper">
            <div class="logo-icon" id="logoIcon"><span>SP</span></div>
            <div class="logo-text">
                <h1 id="brandTitle">SP CONSTRUCTION</h1>
                <p id="brandSubtitle">BUILDING DREAMS</p>
            </div>
        </div>
    </div>
    
    <!-- Auth Card -->
    <div class="auth-card">
        <div class="auth-header">
            <h2>Welcome Back! 👋</h2>
        </div>
        <div id="alertBox" class="alert"></div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope" style="color:#f59e0b; margin-right:8px;"></i> Email Address</label>
            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock" style="color:#f59e0b; margin-right:8px;"></i> Password</label>
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i class="far fa-eye-slash"></i>
                </button>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="handleLogin()">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
        
        <div class="auth-links">
            <a href="forgot-password.html"><i class="fas fa-key"></i> Forgot Password?</a>
        </div>
        
        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">New user?</div>
            <div class="divider-line"></div>
        </div>
        
        <button class="btn btn-secondary" onclick="window.location.href='register.html'">
            <i class="fas fa-user-plus"></i> Create Account
        </button>
    </div>
</div>

<script type="module">
    // ===== LOAD BRANDING =====
    async function loadBranding() {
        try {
            const brandSnap = await window.get(window.ref(window.db, 'companyAssets/branding'));
            if (brandSnap.exists()) {
                const brand = brandSnap.val();
                document.getElementById('brandTitle').textContent = brand.title || 'SP CONSTRUCTION';
                document.getElementById('brandSubtitle').textContent = brand.subtitle || 'BUILDING DREAMS';
            }
        } catch(e) { 
            console.warn("Error loading branding:", e); 
        }
    }
    
    // ===== LOAD LOGO =====
    async function loadCompanyLogo() {
        try {
            const logoRef = window.ref(window.db, 'companyAssets/footerLogo');
            const logoSnap = await window.get(logoRef);
            const logoIcon = document.getElementById('logoIcon');
            if (logoSnap.exists() && logoSnap.val()?.startsWith('data:image')) {
                logoIcon.innerHTML = `<img src="${logoSnap.val()}" alt="Logo">`;
            } else {
                logoIcon.innerHTML = `<span>SP</span>`;
            }
        } catch(e) { 
            console.warn("Error loading logo:", e); 
        }
    }
    
    // ===== ALERT FUNCTION =====
    function showAlert(message, type) {
        const alert = document.getElementById('alertBox');
        alert.textContent = message;
        alert.className = `alert alert-${type} show`;
        setTimeout(() => alert.classList.remove('show'), 6000);
    }
    
    function showLoading(show) {
        const loading = document.getElementById('loading');
        if (show) loading.classList.add('show');
        else loading.classList.remove('show');
    }
    
    // ===== TOGGLE PASSWORD =====
    window.togglePassword = function() {
        const field = document.getElementById('password');
        const toggleBtn = field.parentElement.querySelector('.toggle-password i');
        if (field.type === 'password') {
            field.type = 'text';
            toggleBtn.classList.remove('fa-eye-slash');
            toggleBtn.classList.add('fa-eye');
        } else {
            field.type = 'password';
            toggleBtn.classList.remove('fa-eye');
            toggleBtn.classList.add('fa-eye-slash');
        }
    };
    
    // ===== ENTER KEY SUPPORT =====
    document.getElementById('email').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            document.getElementById('password').focus();
        }
    });
    document.getElementById('password').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            window.handleLogin();
        }
    });
    
    // ===== HANDLE LOGIN =====
    window.handleLogin = async function() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        
        if (!email || !password) {
            showAlert('Please enter email and password', 'error');
            return;
        }
        
        showLoading(true);
        
        try {
            const userCredential = await window.signInWithEmailAndPassword(window.auth, email, password);
            const user = userCredential.user;
            
            // ========== EMAIL VERIFICATION CHECK ==========
            if (!user.emailVerified) {
                showAlert('❌ Your email is not verified! Please check your inbox and click the verification link.', 'error');
                showLoading(false);
                return;
            }
            
            console.log("✅ Email verified successfully!");
            
            // Get user data from Realtime Database
            const snapshot = await window.get(window.ref(window.db, `users/${user.uid}`));
            let userData = snapshot.val();
            
            // Determine user role
            let userRole = 'user';
            let isAdmin = false;
            
            if (userData) {
                if (userData.role === 'admin') {
                    userRole = 'admin';
                    isAdmin = true;
                } else if (userData.isAdmin === true) {
                    userRole = 'admin';
                    isAdmin = true;
                } else {
                    userRole = userData.role || 'user';
                    isAdmin = false;
                }
                console.log("✅ User role from DB:", userRole);
            } else {
                // Check if this is the first user (make them admin)
                const allUsersSnap = await window.get(window.ref(window.db, 'users'));
                const userCount = allUsersSnap.exists() ? Object.keys(allUsersSnap.val()).length : 0;
                
                if (userCount === 0) {
                    userRole = 'admin';
                    isAdmin = true;
                    userData = {
                        uid: user.uid,
                        email: user.email,
                        fullName: user.displayName || email.split('@')[0],
                        emailVerified: user.emailVerified,
                        registeredAt: new Date().toISOString(),
                        role: 'admin',
                        isAdmin: true
                    };
                    await window.set(window.ref(window.db, `users/${user.uid}`), userData);
                    console.log("🎉 First user set as ADMIN!");
                } else {
                    userData = {
                        uid: user.uid,
                        email: user.email,
                        fullName: user.displayName || email.split('@')[0],
                        emailVerified: user.emailVerified,
                        registeredAt: new Date().toISOString(),
                        role: 'user',
                        isAdmin: false
                    };
                    await window.set(window.ref(window.db, `users/${user.uid}`), userData);
                }
            }
            
            // Store user info in localStorage
            localStorage.setItem('currentUser', JSON.stringify(userData));
            localStorage.setItem('currentUserUID', user.uid);
            localStorage.setItem('userRole', userRole);
            
            showAlert('✅ Login successful! Redirecting...', 'success');
            
            console.log("🔄 Redirecting... isAdmin =", isAdmin);
            
            setTimeout(() => {
                if (isAdmin) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            }, 1200);
            
        } catch (error) {
            showLoading(false);
            let message = 'Login failed!';
            console.error("🔴 Login error details:", error);
            console.error("🔴 Error code:", error.code);
            
            switch(error.code) {
                case 'auth/invalid-credential':
                    message = 'Invalid email or password';
                    break;
                case 'auth/user-not-found':
                    message = 'No account found with this email';
                    break;
                case 'auth/wrong-password':
                    message = 'Incorrect password';
                    break;
                case 'auth/too-many-requests':
                    message = 'Too many failed attempts. Try again later.';
                    break;
                case 'auth/network-request-failed':
                    message = 'Network error. Check your connection.';
                    break;
                case 'auth/email-already-in-use':
                    message = 'Email already registered';
                    break;
                default:
                    message = error.message || 'Login failed. Please try again.';
            }
            
            showAlert('❌ ' + message, 'error');
        }
    };
    
    // ===== INIT =====
    async function init() {
        try {
            await loadBranding();
            await loadCompanyLogo();
        } catch(e) {
            console.warn("Error loading branding/logo:", e);
        }
    }
    
    init();
</script>
</body>
</html>
