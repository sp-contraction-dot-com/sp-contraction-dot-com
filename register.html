<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Register - SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- intl-tel-input for international phone -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <!-- Firebase SDK -->
    <script type="module">
        import { firebaseConfig } from './admin/js/firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, sendEmailVerification, updateProfile, fetchSignInMethodsForEmail } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.sendEmailVerification = sendEmailVerification;
        window.updateProfile = updateProfile;
        window.ref = ref;
        window.set = set;
        window.fetchSignInMethodsForEmail = fetchSignInMethodsForEmail;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 30px 20px;
        }
        .auth-container { 
            max-width: 540px; 
            width: 100%; 
            margin-top: 10px;
        }
        
        /* ===== LOGO SECTION ===== */
        .logo-section { 
            text-align: center; 
            margin-bottom: 28px; 
        }
        .logo-wrapper {
            display: inline-flex; 
            align-items: center; 
            gap: 14px;
            background: white;
            padding: 12px 28px; 
            border-radius: 60px;
            border: 1px solid #e8ecf1;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .logo-icon { 
            width: 48px; 
            height: 48px; 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-icon span { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: white; 
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-text h1 { 
            font-size: 1.3rem; 
            font-weight: 800; 
            color: #0f172a;
            line-height: 1.2;
        }
        .logo-text p { 
            font-size: 0.55rem; 
            color: #f59e0b;
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        /* ===== AUTH CARD ===== */
        .auth-card { 
            background: white; 
            border-radius: 32px; 
            padding: 36px 32px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #e8ecf1;
        }
        .auth-header { 
            text-align: center; 
            margin-bottom: 28px; 
        }
        .auth-header h2 { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: #1e293b; 
        }
        .auth-header p { 
            font-size: 0.85rem; 
            color: #64748b; 
            margin-top: 4px; 
        }
        
        /* ===== INPUT ===== */
        .input-group { 
            margin-bottom: 18px; 
        }
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            font-weight: 600; 
            color: #334155; 
            margin-bottom: 6px; 
        }
        .input-group label i { color: #f59e0b; margin-right: 6px; }
        .input-field { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        .input-field i:not(.toggle-password) { 
            position: absolute; 
            left: 16px; 
            color: #94a3b8; 
            font-size: 0.95rem;
            z-index: 2;
        }
        .input-field input { 
            width: 100%; 
            padding: 14px 50px 14px 46px;
            border: 2px solid #e8ecf1; 
            border-radius: 18px;
            font-size: 0.95rem; 
            background: #f8fafc;
            transition: all 0.3s;
        }
        .input-field input:focus { 
            outline: none; 
            border-color: #f59e0b; 
            box-shadow: 0 0 0 4px rgba(245,158,11,0.08);
            background: white;
        }
        .input-field input::placeholder {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            background: transparent;
            border: none;
            cursor: pointer;
            color: #94a3b8;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 2;
        }
        .toggle-password:hover { color: #f59e0b; }
        
        /* ===== PHONE INPUT ===== */
        .iti { width: 100%; display: block; }
        .iti__flag-container { 
            padding-left: 8px;
            z-index: 2;
        }
        .iti__selected-flag { 
            background: transparent !important; 
            border-radius: 18px 0 0 18px; 
            padding-left: 12px;
            height: 100%;
        }
        .iti__selected-flag:hover { background: transparent !important; }
        .phone-input { 
            padding-left: 90px !important;
            width: 100% !important;
        }
        .iti__country-list {
            max-height: 200px;
            overflow-y: auto;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .iti__country {
            padding: 8px 12px;
        }
        .iti__country.iti__highlight {
            background: #fef3c7;
        }
        
        /* ===== ROW 2 ===== */
        .row-2 { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 14px; 
        }
        @media (max-width: 480px) {
            .row-2 { grid-template-columns: 1fr; }
        }
        
        /* ===== BUTTONS ===== */
        .btn {
            width: 100%; 
            padding: 15px; 
            border: none; 
            border-radius: 40px;
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: white;
            box-shadow: 0 4px 12px rgba(245,158,11,0.3);
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(245,158,11,0.35); 
        }
        .btn-secondary { 
            background: transparent; 
            border: 2px solid #e8ecf1; 
            color: #334155; 
            margin-top: 12px; 
        }
        .btn-secondary:hover { 
            background: #f8fafc; 
            transform: translateY(-2px); 
        }
        
        /* ===== LINKS ===== */
        .auth-links { text-align: center; margin-top: 18px; }
        .auth-links a { color: #f59e0b; text-decoration: none; font-size: 0.85rem; font-weight: 500; }
        .auth-links a:hover { text-decoration: underline; }
        
        .divider { 
            display: flex; 
            align-items: center; 
            gap: 14px; 
            margin: 22px 0; 
        }
        .divider-line { 
            flex: 1; 
            height: 1px; 
            background: #e8ecf1; 
        }
        .divider-text { 
            font-size: 0.8rem; 
            color: #94a3b8; 
            font-weight: 500;
            white-space: nowrap;
        }
        
        /* ===== PASSWORD STRENGTH ===== */
        .password-strength { 
            margin-top: 6px; 
            font-size: 0.75rem; 
        }
        .strength-weak { color: #ef4444; }
        .strength-medium { color: #f59e0b; }
        .strength-strong { color: #22c55e; }
        
        /* ===== ALERT ===== */
        .alert { 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: 0.85rem; 
            margin-bottom: 22px; 
            display: none; 
            font-weight: 500;
            line-height: 1.5;
        }
        .alert-error { 
            background: #fef2f2; 
            color: #dc2626; 
            border: 1px solid #fecaca; 
        }
        .alert-success { 
            background: #f0fdf4; 
            color: #16a34a; 
            border: 1px solid #bbf7d0; 
        }
        .alert.show { 
            display: block; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: white;
            border-radius: 32px;
            padding: 36px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-icon { 
            width: 80px; 
            height: 80px; 
            background: linear-gradient(135deg, #22c55e, #15803d); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 20px; 
        }
        .modal-icon i { font-size: 2.5rem; color: white; }
        .modal-content h3 { 
            font-size: 1.3rem; 
            font-weight: 800; 
            color: #0f172a; 
            margin-bottom: 8px;
        }
        .modal-content p { 
            color: #64748b; 
            font-size: 0.85rem; 
            line-height: 1.5;
        }
        .user-id-box { 
            background: #fef3c7; 
            padding: 15px; 
            border-radius: 16px; 
            margin: 15px 0; 
            border: 1px solid #fde68a;
        }
        .user-id-box p { 
            font-size: 0.7rem; 
            color: #92400e; 
            font-weight: 600;
        }
        .user-id-box span { 
            font-size: 1.5rem; 
            font-weight: 800; 
            letter-spacing: 2px; 
            color: #d97706; 
        }
        .copy-btn { 
            background: #f1f5f9; 
            border: none; 
            padding: 8px 20px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 0.8rem;
            color: #475569;
            transition: 0.2s;
        }
        .copy-btn:hover { background: #f59e0b; color: white; }
        .resend-info {
            margin-top: 12px;
            font-size: 0.8rem;
            color: #64748b;
        }
        .resend-link {
            color: #f59e0b;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }
        .resend-link:hover { color: #d97706; }
        
        /* ===== LOADING ===== */
        .loading {
            display: none;
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }
        .loading.show { display: flex; }
        .spinner { 
            width: 48px; 
            height: 48px; 
            border: 4px solid rgba(255,255,255,0.2); 
            border-top: 4px solid #f59e0b; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        @media (max-width: 480px) {
            body { padding: 16px; }
            .auth-card { padding: 24px 18px; }
            .logo-wrapper { padding: 10px 18px; gap: 10px; }
            .logo-icon { width: 40px; height: 40px; }
            .logo-icon span { font-size: 1.1rem; }
            .logo-text h1 { font-size: 1rem; }
            .auth-header h2 { font-size: 1.3rem; }
            .btn { padding: 13px; font-size: 0.9rem; }
            .input-field input { padding: 12px 46px 12px 42px; font-size: 0.9rem; }
            .modal-content { padding: 28px 20px; }
            .row-2 { gap: 10px; }
        }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<!-- Success Modal -->
<div class="modal" id="successModal">
    <div class="modal-content">
        <div class="modal-icon"><i class="fas fa-envelope-open-text"></i></div>
        <h3>Verification Email Sent! 📧</h3>
        <p>Please check your inbox and click the verification link to activate your account.</p>
        <div class="user-id-box">
            <p>Your User ID:</p>
            <span id="displayUserId">********</span>
        </div>
        <button class="copy-btn" onclick="copyUserId()"><i class="fas fa-copy"></i> Copy User ID</button>
        <div class="resend-info">
            <span>Didn't receive the email? </span>
            <span class="resend-link" onclick="resendVerificationEmail()">Click here to resend</span>
        </div>
        <button class="btn btn-primary" onclick="window.location.href='login.html'" style="margin-top: 18px;">
            <i class="fas fa-sign-in-alt"></i> Go to Login
        </button>
    </div>
</div>

<div class="auth-container">
    <!-- Logo Section -->
    <div class="logo-section">
        <div class="logo-wrapper">
            <div class="logo-icon" id="logoIcon"><span>SP</span></div>
            <div class="logo-text">
                <h1 id="brandTitle">SP CONSTRUCTION</h1>
                <p id="brandSubtitle">BUILDING DREAMS</p>
            </div>
        </div>
    </div>
    
    <!-- Auth Card -->
    <div class="auth-card">
        <div class="auth-header">
            <h2>Create Account ✨</h2>
            <p>Please fill in your information</p>
        </div>
        <div id="alertBox" class="alert"></div>
        
        <div class="row-2">
            <div class="input-group">
                <label><i class="fas fa-user"></i> First Name</label>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="firstName" placeholder="John">
                </div>
            </div>
            <div class="input-group">
                <label><i class="fas fa-user"></i> Last Name</label>
                <div class="input-field">
                    <i class="fas fa-user"></i>
                    <input type="text" id="lastName" placeholder="Doe">
                </div>
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-phone"></i> Phone Number</label>
            <div class="input-field">
                <i class="fas fa-phone"></i>
                <input type="tel" id="mobile" class="phone-input" placeholder="+91 98765 43210">
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-calendar"></i> Date of Birth</label>
            <div class="input-field">
                <i class="fas fa-calendar"></i>
                <input type="date" id="dob">
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-field">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Min 6 characters">
                <button type="button" class="toggle-password" onclick="togglePassword('password')">
                    <i class="far fa-eye-slash"></i>
                </button>
            </div>
            <div class="password-strength" id="passwordStrength"></div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-check-circle"></i> Confirm Password</label>
            <div class="input-field">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">
                <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                    <i class="far fa-eye-slash"></i>
                </button>
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="handleRegister()">
            <i class="fas fa-user-plus"></i> Register Now
        </button>
        
        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">Already have an account?</div>
            <div class="divider-line"></div>
        </div>
        
        <button class="btn btn-secondary" onclick="window.location.href='login.html'">
            <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
    </div>
</div>

<script>
    let tempUserId = '';
    let tempUserEmail = '';
    let iti = null;
    let createdUser = null;
    
    // ===== LOAD BRANDING =====
    async function loadBranding() {
        try {
            const { ref, get } = await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js");
            const db = window.db;
            const brandSnap = await get(ref(db, 'companyAssets/branding'));
            if (brandSnap.exists()) {
                const brand = brandSnap.val();
                document.getElementById('brandTitle').textContent = brand.title || 'SP CONSTRUCTION';
                document.getElementById('brandSubtitle').textContent = brand.subtitle || 'BUILDING DREAMS';
            }
        } catch(e) { console.warn("Error loading branding:", e); }
    }
    
    // ===== LOAD LOGO =====
    async function loadCompanyLogo() {
        try {
            const { ref, get } = await import("https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js");
            const db = window.db;
            const logoRef = ref(db, 'companyAssets/footerLogo');
            const logoSnap = await get(logoRef);
            const logoIcon = document.getElementById('logoIcon');
            if (logoSnap.exists() && logoSnap.val()?.startsWith('data:image')) {
                logoIcon.innerHTML = `<img src="${logoSnap.val()}" alt="Logo">`;
            } else {
                logoIcon.innerHTML = `<span>SP</span>`;
            }
        } catch(e) { console.warn("Error loading logo:", e); }
    }
    
    function showAlert(message, type) {
        const alert = document.getElementById('alertBox');
        alert.textContent = message;
        alert.className = `alert alert-${type} show`;
        setTimeout(() => alert.classList.remove('show'), 6000);
    }
    
    function showLoading(show) {
        const loading = document.getElementById('loading');
        if (show) loading.classList.add('show');
        else loading.classList.remove('show');
    }
    
    function generateUserId() {
        return Math.floor(10000000 + Math.random() * 90000000).toString();
    }
    
    function checkPasswordStrength(password) {
        const strengthDiv = document.getElementById('passwordStrength');
        if (!password) {
            strengthDiv.innerHTML = '';
            return;
        }
        
        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;
        
        if (strength <= 2) {
            strengthDiv.innerHTML = '<span class="strength-weak">🔴 Weak Password</span>';
        } else if (strength <= 4) {
            strengthDiv.innerHTML = '<span class="strength-medium">🟡 Medium Password</span>';
        } else {
            strengthDiv.innerHTML = '<span class="strength-strong">🟢 Strong Password</span>';
        }
    }
    
    window.togglePassword = function(fieldId) {
        const field = document.getElementById(fieldId);
        const toggleBtn = field.parentElement.querySelector('.toggle-password i');
        
        if (field.type === 'password') {
            field.type = 'text';
            toggleBtn.classList.remove('fa-eye-slash');
            toggleBtn.classList.add('fa-eye');
        } else {
            field.type = 'password';
            toggleBtn.classList.remove('fa-eye');
            toggleBtn.classList.add('fa-eye-slash');
        }
    };
    
    window.copyUserId = function() {
        navigator.clipboard.writeText(tempUserId).then(() => {
            showAlert('User ID copied to clipboard!', 'success');
        }).catch(() => {
            // Fallback
            document.getElementById('displayUserId').select?.();
        });
    };
    
    window.resendVerificationEmail = async function() {
        if (createdUser) {
            showLoading(true);
            try {
                await window.sendEmailVerification(createdUser);
                showLoading(false);
                showAlert('✅ Verification email resent! Please check your inbox.', 'success');
            } catch (error) {
                showLoading(false);
                showAlert('❌ Failed to resend email. Please try again later.', 'error');
            }
        }
    };
    
    // ===== INITIALIZE PHONE INPUT =====
    document.addEventListener('DOMContentLoaded', function() {
        const phoneInput = document.querySelector('#mobile');
        if (phoneInput && typeof intlTelInput !== 'undefined') {
            iti = window.intlTelInput(phoneInput, {
                initialCountry: "in",
                separateDialCode: true,
                preferredCountries: ["in", "us", "gb", "ae", "sa", "my", "sg", "bd"],
                utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js"
            });
        }
    });
    
    document.getElementById('password')?.addEventListener('input', function(e) {
        checkPasswordStrength(e.target.value);
    });
    
    // ===== CHECK EMAIL EXISTS =====
    async function checkEmailExists(email) {
        try {
            const methods = await window.fetchSignInMethodsForEmail(window.auth, email);
            return methods.length > 0;
        } catch (error) {
            console.error("Error checking email:", error);
            return false;
        }
    }
    
    // ===== HANDLE REGISTER =====
    window.handleRegister = async function() {
        const firstName = document.getElementById('firstName').value.trim();
        const lastName = document.getElementById('lastName').value.trim();
        const fullName = `${firstName} ${lastName}`.trim();
        const email = document.getElementById('email').value.trim();
        let mobile = document.getElementById('mobile').value.trim();
        const dob = document.getElementById('dob').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        // Get full international number from intl-tel-input
        if (iti) {
            const fullNumber = iti.getNumber();
            if (fullNumber) mobile = fullNumber;
        }
        
        // Validation
        if (!firstName || !lastName) {
            showAlert('Please enter first name and last name', 'error');
            return;
        }
        if (!email) {
            showAlert('Please enter email address', 'error');
            return;
        }
        if (!mobile) {
            showAlert('Please enter phone number', 'error');
            return;
        }
        if (!dob) {
            showAlert('Please select date of birth', 'error');
            return;
        }
        if (!password) {
            showAlert('Please enter password', 'error');
            return;
        }
        if (password !== confirmPassword) {
            showAlert('Passwords do not match', 'error');
            return;
        }
        if (password.length < 6) {
            showAlert('Password must be at least 6 characters', 'error');
            return;
        }
        if (!/^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email)) {
            showAlert('Please enter a valid email address', 'error');
            return;
        }
        
        showLoading(true);
        
        // First check if email already exists
        const emailExists = await checkEmailExists(email);
        if (emailExists) {
            showLoading(false);
            showAlert('This email is already registered! Please use a different email or login.', 'error');
            return;
        }
        
        try {
            const userCredential = await window.createUserWithEmailAndPassword(window.auth, email, password);
            const user = userCredential.user;
            createdUser = user;
            tempUserEmail = email;
            
            tempUserId = generateUserId();
            
            await window.updateProfile(user, { displayName: fullName });
            
            // Send email verification
            await window.sendEmailVerification(user);
            console.log("✅ Verification email sent to:", email);
            
            // Save to database
            try {
                await window.set(window.ref(window.db, `users/${user.uid}`), {
                    userId: tempUserId,
                    firstName: firstName,
                    lastName: lastName,
                    fullName: fullName,
                    email: email,
                    mobile: mobile,
                    dob: dob,
                    registeredAt: new Date().toISOString(),
                    emailVerified: false,
                    uid: user.uid,
                    profileCompleted: false
                });
                console.log("✅ User data saved to database");
            } catch (dbError) {
                console.warn("Database save warning:", dbError);
            }
            
            showLoading(false);
            document.getElementById('displayUserId').textContent = tempUserId;
            document.getElementById('successModal').classList.add('show');
            
        } catch (error) {
            showLoading(false);
            let message = 'Registration failed!';
            if (error.code === 'auth/email-already-in-use') {
                message = 'This email is already registered! Please use a different email.';
            } else if (error.code === 'auth/invalid-email') {
                message = 'Invalid email address';
            } else if (error.code === 'auth/weak-password') {
                message = 'Password is too weak';
            } else if (error.code === 'auth/network-request-failed') {
                message = 'Network error. Please check your connection.';
            } else {
                message = error.message || 'Registration failed. Please try again.';
            }
            showAlert('❌ ' + message, 'error');
            console.error("Registration error:", error);
        }
    };
    
    // ===== LOAD BRANDING & LOGO =====
    loadBranding();
    loadCompanyLogo();
</script>
</body>
</html>
