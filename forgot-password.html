<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Forgot Password - SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK - Using admin/js path -->
    <script type="module">
        import { firebaseConfig } from './admin/js/firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.ref = ref;
        window.get = get;
        window.sendPasswordResetEmail = sendPasswordResetEmail;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }
        .auth-container { 
            max-width: 520px; 
            width: 100%; 
        }
        
        /* ===== LOGO SECTION ===== */
        .logo-section { 
            text-align: center; 
            margin-bottom: 32px; 
        }
        .logo-wrapper {
            display: inline-flex; 
            align-items: center; 
            gap: 14px;
            background: white;
            padding: 14px 32px; 
            border-radius: 60px;
            border: 1px solid #e8ecf1;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .logo-icon { 
            width: 52px; 
            height: 52px; 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }
        .logo-icon span { 
            font-size: 1.6rem; 
            font-weight: 800; 
            color: white; 
        }
        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-text h1 { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: #0f172a;
            line-height: 1.2;
        }
        .logo-text p { 
            font-size: 0.6rem; 
            color: #f59e0b;
            letter-spacing: 2px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        /* ===== AUTH CARD ===== */
        .auth-card { 
            background: white; 
            border-radius: 32px; 
            padding: 40px 36px; 
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #e8ecf1;
        }
        .auth-header { 
            text-align: center; 
            margin-bottom: 32px; 
        }
        .auth-header h2 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            color: #1e293b; 
        }
        .auth-header p { 
            font-size: 0.9rem; 
            color: #64748b; 
            margin-top: 8px; 
            line-height: 1.5;
        }
        
        /* ===== INPUT ===== */
        .input-group { 
            margin-bottom: 22px; 
        }
        .input-group label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #334155; 
            margin-bottom: 8px; 
        }
        .input-field { 
            position: relative; 
            display: flex; 
            align-items: center; 
        }
        .input-field i { 
            position: absolute; 
            left: 18px; 
            color: #94a3b8; 
            z-index: 2; 
            font-size: 1rem;
        }
        .input-field input { 
            width: 100%; 
            padding: 16px 18px 16px 50px; 
            border: 2px solid #e8ecf1; 
            border-radius: 18px; 
            font-size: 1rem; 
            background: #f8fafc;
            transition: all 0.3s;
        }
        .input-field input:focus { 
            outline: none; 
            border-color: #f59e0b; 
            box-shadow: 0 0 0 4px rgba(245,158,11,0.08);
            background: white;
        }
        .input-field input::placeholder {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        
        /* ===== BUTTONS ===== */
        .btn { 
            width: 100%; 
            padding: 16px; 
            border: none; 
            border-radius: 40px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 12px; 
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary { 
            background: linear-gradient(135deg, #f59e0b, #d97706); 
            color: white; 
        }
        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 25px rgba(245,158,11,0.35); 
        }
        .btn-primary:active {
            transform: translateY(0);
        }
        .btn-secondary { 
            background: transparent; 
            border: 2px solid #e8ecf1; 
            color: #334155; 
            margin-top: 14px; 
        }
        .btn-secondary:hover { 
            background: #f8fafc; 
            transform: translateY(-2px); 
        }
        
        /* ===== ALERT ===== */
        .alert { 
            padding: 14px 18px; 
            border-radius: 18px; 
            font-size: 0.85rem; 
            margin-bottom: 24px; 
            display: none; 
            font-weight: 500;
            line-height: 1.5;
        }
        .alert-error { 
            background: #fef2f2; 
            color: #dc2626; 
            border: 1px solid #fecaca; 
        }
        .alert-success { 
            background: #f0fdf4; 
            color: #16a34a; 
            border: 1px solid #bbf7d0; 
        }
        .alert.show { 
            display: block; 
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== LOADING ===== */
        .loading { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            justify-content: center; 
            align-items: center; 
            z-index: 999; 
        }
        .loading.show { 
            display: flex; 
        }
        .spinner { 
            width: 48px; 
            height: 48px; 
            border: 4px solid rgba(255,255,255,0.2); 
            border-top: 4px solid #f59e0b; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 
            0% { transform: rotate(0deg); } 
            100% { transform: rotate(360deg); } 
        }
        
        .footer-text {
            text-align: center;
            margin-top: 24px;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .footer-text a {
            color: #f59e0b;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-text a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            body { padding: 16px; }
            .auth-card { padding: 28px 20px; }
            .logo-wrapper { padding: 10px 20px; gap: 10px; }
            .logo-icon { width: 42px; height: 42px; }
            .logo-icon span { font-size: 1.3rem; }
            .logo-text h1 { font-size: 1.1rem; }
            .auth-header h2 { font-size: 1.4rem; }
            .btn { padding: 14px; font-size: 0.9rem; }
            .input-field input { padding: 14px 16px 14px 46px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="auth-container">
    <!-- Logo Section -->
    <div class="logo-section">
        <div class="logo-wrapper">
            <div class="logo-icon" id="logoIcon"><span>SP</span></div>
            <div class="logo-text">
                <h1 id="brandTitle">SP CONSTRUCTION</h1>
                <p id="brandSubtitle">BUILDING DREAMS</p>
            </div>
        </div>
    </div>
    
    <!-- Auth Card -->
    <div class="auth-card">
        <div class="auth-header">
            <h2>🔐 Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password</p>
        </div>
        <div id="alertBox" class="alert"></div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope" style="color:#f59e0b; margin-right:8px;"></i> Email Address</label>
            <div class="input-field">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
            </div>
        </div>
        
        <button class="btn btn-primary" onclick="handleReset()">
            <i class="fas fa-paper-plane"></i> Send Reset Link
        </button>
        <button class="btn btn-secondary" onclick="window.location.href='login.html'">
            <i class="fas fa-arrow-left"></i> Back to Login
        </button>
    </div>
    
    <div class="footer-text">
        <p>Remember your password? <a href="login.html">Sign in</a></p>
    </div>
</div>

<script type="module">
    // ===== LOAD BRANDING =====
    async function loadBranding() {
        try {
            const brandSnap = await window.get(window.ref(window.db, 'companyAssets/branding'));
            if (brandSnap.exists()) {
                const brand = brandSnap.val();
                document.getElementById('brandTitle').textContent = brand.title || 'SP CONSTRUCTION';
                document.getElementById('brandSubtitle').textContent = brand.subtitle || 'BUILDING DREAMS';
            }
        } catch(e) { 
            console.warn("Error loading branding:", e); 
        }
    }
    
    // ===== LOAD LOGO =====
    async function loadCompanyLogo() {
        try {
            const logoRef = window.ref(window.db, 'companyAssets/footerLogo');
            const logoSnap = await window.get(logoRef);
            const logoIcon = document.getElementById('logoIcon');
            if (logoSnap.exists() && logoSnap.val()?.startsWith('data:image')) {
                logoIcon.innerHTML = `<img src="${logoSnap.val()}" alt="Logo">`;
            } else {
                logoIcon.innerHTML = `<span>SP</span>`;
            }
        } catch(e) { 
            console.warn("Error loading logo:", e); 
        }
    }
    
    // ===== ALERT FUNCTION =====
    function showAlert(message, type) {
        const alert = document.getElementById('alertBox');
        alert.textContent = message;
        alert.className = `alert alert-${type} show`;
        setTimeout(() => alert.classList.remove('show'), 6000);
    }
    
    function showLoading(show) {
        const loading = document.getElementById('loading');
        if (show) loading.classList.add('show');
        else loading.classList.remove('show');
    }
    
    // ===== HANDLE RESET =====
    window.handleReset = async function() {
        const email = document.getElementById('email').value.trim();
        
        if (!email) {
            showAlert('Please enter your email address', 'error');
            return;
        }
        
        // Simple email validation
        if (!email.includes('@') || !email.includes('.')) {
            showAlert('Please enter a valid email address', 'error');
            return;
        }
        
        showLoading(true);
        
        try {
            await window.sendPasswordResetEmail(window.auth, email);
            showLoading(false);
            showAlert('✅ Password reset link has been sent to your email! Please check your inbox.', 'success');
            document.getElementById('email').value = '';
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 3000);
        } catch (error) {
            showLoading(false);
            let message = 'Failed to send reset link!';
            switch(error.code) {
                case 'auth/user-not-found':
                    message = 'No account found with this email address';
                    break;
                case 'auth/invalid-email':
                    message = 'Invalid email address';
                    break;
                case 'auth/too-many-requests':
                    message = 'Too many requests. Please try again later.';
                    break;
                default:
                    message = error.message || 'Something went wrong. Please try again.';
            }
            showAlert('❌ ' + message, 'error');
            console.error("Reset error:", error);
        }
    };
    
    // ===== ENTER KEY SUPPORT =====
    document.getElementById('email').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            window.handleReset();
        }
    });
    
    // ===== INIT =====
    async function init() {
        try {
            await loadBranding();
            await loadCompanyLogo();
        } catch(e) {
            console.warn("Error loading branding/logo:", e);
        }
    }
    
    init();
</script>
</body>
</html>
