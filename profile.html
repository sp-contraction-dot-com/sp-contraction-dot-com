<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Profile - SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAT3LQUFBhiZINM9NZTulX7umf-P1Y6i2I",
            authDomain: "sp-build-official.firebaseapp.com",
            projectId: "sp-build-official",
            storageBucket: "sp-build-official.firebasestorage.app",
            messagingSenderId: "377403616440",
            appId: "1:377403616440:web:bfae56e748f05de22a184d",
            measurementId: "G-P319FN0C0N",
            databaseURL: "https://sp-build-official-default-rtdb.firebaseio.com/"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.signOut = signOut;
        window.updateProfile = updateProfile;
        window.ref = ref;
        window.get = get;
        window.update = update;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #2e1065 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 550px; margin: 0 auto; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .top-bar .logo-small { background: rgba(255,255,255,0.1); border: none; width: 44px; height: 44px; border-radius: 50%; color: white; cursor: pointer; font-size: 1.2rem; }
        .logo-section { text-align: center; margin-bottom: 30px; }
        .logo-wrapper {
            display: inline-flex; align-items: center; gap: 12px;
            background: rgba(255,255,255,0.05); padding: 10px 24px; border-radius: 60px;
        }
        .logo-icon { width: 45px; height: 45px; background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .logo-icon span { font-size: 1.4rem; font-weight: 800; color: white; }
        .logo-text h1 { font-size: 1.3rem; font-weight: 800; background: linear-gradient(135deg, #ffffff, #fcd34d); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .profile-card { background: rgba(255,255,255,0.98); border-radius: 32px; padding: 32px 24px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        .profile-header { text-align: center; margin-bottom: 24px; position: relative; }
        .avatar {
            width: 100px; height: 100px; background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 2.5rem; font-weight: 800; color: white;
        }
        .info-row {
            display: flex; justify-content: space-between; padding: 14px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .info-label { font-weight: 600; color: #475569; }
        .info-value { color: #1e293b; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 40px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 16px; }
        .btn-logout { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-logout:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(239,68,68,0.3); }
        .btn-home { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
        .btn-home:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245,158,11,0.3); }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; font-weight: 600;
            margin-top: 10px;
        }
        .badge-verified { background: #22c55e15; color: #15803d; border: 1px solid #22c55e30; }
        .badge-not-verified { background: #ef444415; color: #b91c1c; border: 1px solid #ef444430; }
        .loading { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 999; }
        .loading.show { display: flex; }
        .spinner { width: 50px; height: 50px; border: 4px solid #f3f3f3; border-top: 4px solid #f59e0b; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .debug-info { background: #f1f5f9; padding: 12px; border-radius: 16px; margin-top: 20px; font-size: 0.7rem; color: #64748b; display: none; }
        .refresh-btn {
            background: transparent; border: none; color: #f59e0b; cursor: pointer; font-size: 0.8rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<div class="container">
    <div class="top-bar">
        <button class="logo-small" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i></button>
        <button class="logo-small" onclick="refreshProfile()" style="background: rgba(245,158,11,0.2);"><i class="fas fa-sync-alt"></i></button>
    </div>
    
    <div class="logo-section">
        <div class="logo-wrapper">
            <div class="logo-icon"><span>SP</span></div>
            <div class="logo-text"><h1>SP CONSTRUCTION</h1><p>BUILDING DREAMS</p></div>
        </div>
    </div>
    
    <div class="profile-card" id="profileCard">
        <div class="profile-header">
            <div class="avatar" id="avatar">SP</div>
            <h2 id="displayName">Loading...</h2>
            <p id="userIdText" style="color: #f59e0b; font-weight: 600; margin-top: 5px;">ID: -</p>
            <span id="verifiedBadge" class="badge"></span>
        </div>
        
        <div class="info-row">
            <span class="info-label"><i class="fas fa-user"></i> First Name</span>
            <span class="info-value" id="firstName">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-user"></i> Last Name</span>
            <span class="info-value" id="lastName">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-envelope"></i> Email</span>
            <span class="info-value" id="email">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-phone"></i> Phone</span>
            <span class="info-value" id="mobile">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-calendar"></i> Date of Birth</span>
            <span class="info-value" id="dob">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-briefcase"></i> Position</span>
            <span class="info-value" id="position">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-building"></i> Company</span>
            <span class="info-value" id="company">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-map-marker-alt"></i> Address</span>
            <span class="info-value" id="address">-</span>
        </div>
        <div class="info-row">
            <span class="info-label"><i class="fas fa-clock"></i> Member Since</span>
            <span class="info-value" id="registeredAt">-</span>
        </div>
        
        <button class="btn btn-home" onclick="window.location.href='dashboard.html'"> Go to Dashboard</button>
        <button class="btn btn-logout" onclick="handleLogout()"> Logout</button>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>
</div>

<script type="module">
    let currentUserData = null;
    let currentUserUID = null;
    
    function showLoading(show) {
        const loading = document.getElementById('loading');
        if (show) loading.classList.add('show');
        else loading.classList.remove('show');
    }
    
    function showDebug(message) {
        const debugDiv = document.getElementById('debugInfo');
        debugDiv.innerHTML = message;
        debugDiv.style.display = 'block';
        setTimeout(() => {
            debugDiv.style.display = 'none';
        }, 5000);
    }
    
    async function loadUserData(user) {
        if (!user) return;
        
        currentUserUID = user.uid;
        console.log("User UID:", currentUserUID);
        console.log("User Email:", user.email);
        console.log("Email Verified:", user.emailVerified);
        
        try {
            // Try to get data from Realtime Database
            const userRef = window.ref(window.db, `users/${currentUserUID}`);
            const snapshot = await window.get(userRef);
            const dbData = snapshot.val();
            
            console.log("Database Data:", dbData);
            
            if (dbData) {
                // Data found in database
                currentUserData = dbData;
                localStorage.setItem('currentUser', JSON.stringify(dbData));
                localStorage.setItem('currentUserUID', currentUserUID);
                displayProfileData(dbData, user.emailVerified);
                showDebug(' Data loaded from Firebase Database');
            } else {
                // No data in database, create from auth info
                console.log("No database record found, creating from auth");
                const authData = {
                    uid: user.uid,
                    email: user.email,
                    fullName: user.displayName || user.email.split('@')[0],
                    firstName: user.displayName?.split(' ')[0] || '',
                    lastName: user.displayName?.split(' ')[1] || '',
                    emailVerified: user.emailVerified,
                    registeredAt: new Date().toISOString(),
                    mobile: 'Not set',
                    dob: 'Not set',
                    position: 'Not set',
                    company: 'Not set',
                    address: 'Not set'
                };
                currentUserData = authData;
                localStorage.setItem('currentUser', JSON.stringify(authData));
                localStorage.setItem('currentUserUID', currentUserUID);
                displayProfileData(authData, user.emailVerified);
                showDebug(' No database record found! Showing auth data. Please complete your profile.');
            }
            
        } catch (error) {
            console.error("Error loading user data:", error);
            showDebug(' Error loading data: ' + error.message);
            
            // Fallback: Show auth data
            const fallbackData = {
                uid: user.uid,
                email: user.email,
                fullName: user.displayName || user.email.split('@')[0],
                firstName: user.displayName?.split(' ')[0] || '',
                lastName: user.displayName?.split(' ')[1] || '',
                emailVerified: user.emailVerified,
                registeredAt: new Date().toISOString(),
                mobile: 'Not set',
                dob: 'Not set',
                position: 'Not set',
                company: 'Not set',
                address: 'Not set'
            };
            currentUserData = fallbackData;
            displayProfileData(fallbackData, user.emailVerified);
        }
    }
    
    function displayProfileData(data, emailVerified) {
        // Set avatar initials
        const firstName = data.firstName || '';
        const lastName = data.lastName || '';
        const initial = (firstName.charAt(0) + lastName.charAt(0)).toUpperCase() || 
                       (data.fullName?.charAt(0) || 'S') + (data.fullName?.split(' ')[1]?.charAt(0) || 'P');
        
        document.getElementById('avatar').textContent = initial || 'SP';
        document.getElementById('displayName').textContent = data.fullName || `${firstName} ${lastName}` || data.email || 'User';
        document.getElementById('userIdText').innerHTML = `<i class="fas fa-id-card"></i> ID: ${data.userId || 'Not assigned'}`;
        document.getElementById('firstName').textContent = data.firstName || 'Not set';
        document.getElementById('lastName').textContent = data.lastName || 'Not set';
        document.getElementById('email').textContent = data.email || 'Not set';
        document.getElementById('mobile').textContent = data.mobile || 'Not set';
        document.getElementById('dob').textContent = data.dob || 'Not set';
        document.getElementById('position').textContent = data.position || 'Not set';
        document.getElementById('company').textContent = data.company || 'Not set';
        document.getElementById('address').textContent = data.address || 'Not set';
        
        // Format registered date
        if (data.registeredAt) {
            const date = new Date(data.registeredAt);
            document.getElementById('registeredAt').textContent = date.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
        } else {
            document.getElementById('registeredAt').textContent = 'Not available';
        }
        
        // Email verification badge
        const verifiedBadge = document.getElementById('verifiedBadge');
        const isVerified = emailVerified === true || data.emailVerified === true;
        
        if (isVerified) {
            verifiedBadge.innerHTML = '<i class="fas fa-check-circle"></i> Email Verified';
            verifiedBadge.className = 'badge badge-verified';
        } else {
            verifiedBadge.innerHTML = '<i class="fas fa-times-circle"></i> Email Not Verified - Please check your email';
            verifiedBadge.className = 'badge badge-not-verified';
        }
    }
    
    window.refreshProfile = async function() {
        showLoading(true);
        const user = window.auth.currentUser;
        if (user) {
            await loadUserData(user);
        } else {
            window.location.href = 'login.html';
        }
        showLoading(false);
    };
    
    window.handleLogout = async function() {
        showLoading(true);
        try {
            await window.signOut(window.auth);
            localStorage.removeItem('currentUser');
            localStorage.removeItem('currentUserUID');
            window.location.href = 'login.html';
        } catch (error) {
            showLoading(false);
            console.error("Logout error:", error);
            alert('Failed to logout. Please try again.');
        }
    };
    
    // Check auth state on load
    window.onAuthStateChanged(window.auth, async (user) => {
        if (user) {
            console.log("User logged in:", user.email);
            showLoading(true);
            await loadUserData(user);
            showLoading(false);
        } else {
            console.log("No user logged in, redirecting to login");
            window.location.href = 'login.html';
        }
    });
    
    // Also try to load from localStorage as backup
    const storedUser = localStorage.getItem('currentUser');
    const storedUID = localStorage.getItem('currentUserUID');
    if (storedUser && storedUID && !window.auth.currentUser) {
        try {
            const parsedData = JSON.parse(storedUser);
            displayProfileData(parsedData, parsedData.emailVerified);
            showDebug(' Data loaded from local storage');
        } catch(e) {}
    }
</script>
</body>
</html>
