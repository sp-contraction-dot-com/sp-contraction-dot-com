<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>My Profile | SP Construction</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module">
        import { firebaseConfig } from './admin/js/firebase-config.js';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);
        
        window.auth = auth;
        window.db = database;
        window.signOut = signOut;
        window.updateProfile = updateProfile;
        window.ref = ref;
        window.get = get;
        window.update = update;
        window.onAuthStateChanged = onAuthStateChanged;
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 24px;
        }
        .container { 
            max-width: 820px; 
            margin: 0 auto; 
        }
        
        /* ===== HEADER ===== */
        .glass-header {
            background: white;
            border-radius: 28px;
            padding: 14px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #e8ecf1;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .icon-btn {
            background: #f8fafc;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #475569;
            transition: 0.2s;
            border: none;
            font-size: 1rem;
        }
        .icon-btn:hover { background: #f59e0b; color: white; transform: translateY(-2px); }
        .logo-mini {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-mini .icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            overflow: hidden;
        }
        .logo-mini .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .logo-mini .brand-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
        }
        .logo-mini .brand-text .title { 
            font-size: 1.1rem; 
            color: #0f172a; 
            font-weight: 700; 
            letter-spacing: 0.5px; 
        }
        .logo-mini .brand-text .subtitle { 
            font-size: 0.5rem; 
            color: #f59e0b;
            letter-spacing: 1.5px;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        /* ===== PROFILE CARD ===== */
        .profile-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            border: 1px solid #e8ecf1;
        }
        
        .cover {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 24px 24px 55px 24px;
            position: relative;
        }
        .avatar-wrap {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
        }
        .avatar-frame {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            padding: 4px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }
        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 800;
            color: white;
            overflow: hidden;
        }
        .avatar-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .camera-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: #f59e0b;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid white;
            color: white;
            font-size: 0.8rem;
        }
        
        /* ===== INFO SECTION ===== */
        .info-section {
            padding: 55px 28px 28px;
            text-align: center;
        }
        .name {
            font-size: 1.6rem;
            font-weight: 800;
            color: #0f172a;
        }
        .user-id {
            background: #fef3c7;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #d97706;
            margin-top: 6px;
        }
        .verify-badge {
            margin-top: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            padding: 4px 14px;
            border-radius: 30px;
        }
        .verified { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .not-verified { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        
        /* ===== INFO GRID ===== */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 28px 0 24px;
            text-align: left;
        }
        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
        }
        .info-row {
            background: #f8fafc;
            border-radius: 18px;
            padding: 12px 16px;
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            border: 1px solid #eef2f6;
            transition: 0.2s;
        }
        .info-row:hover { border-color: #f59e0b; background: #fffbeb; }
        .info-label {
            font-weight: 700;
            color: #f59e0b;
            min-width: 80px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .info-value {
            color: #1e293b;
            font-weight: 500;
            word-break: break-word;
            flex: 1;
        }
        
        /* ===== BUTTONS ===== */
        .btn-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 4px 12px rgba(245,158,11,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(245,158,11,0.4); }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            box-shadow: 0 4px 12px rgba(239,68,68,0.2);
        }
        .btn-danger:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239,68,68,0.3); }
        
        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.show { display: flex; }
        .modal-card {
            background: white;
            border-radius: 32px;
            max-width: 580px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f1f5f9;
        }
        .modal-header h3 { 
            font-size: 1.4rem; 
            font-weight: 800; 
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-header h3 i { color: #f59e0b; }
        .close-modal {
            background: #f1f5f9;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            color: #64748b;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-modal:hover { background: #ef4444; color: white; }
        
        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .form-group label i { color: #f59e0b; margin-right: 6px; }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e8ecf1;
            border-radius: 18px;
            font-size: 0.9rem;
            background: #f8fafc;
            transition: 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 4px rgba(245,158,11,0.08);
            background: white;
        }
        .form-group input:read-only {
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }
        
        /* ===== PIC UPLOAD ===== */
        .pic-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .pic-preview {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #f59e0b;
            background: #f1f5f9;
        }
        .file-label {
            background: #f1f5f9;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            color: #475569;
            border: 2px dashed #e2e8f0;
        }
        .file-label:hover { background: #fef3c7; border-color: #f59e0b; }
        .upload-status {
            font-size: 0.75rem;
            margin-top: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            background: #f1f5f9;
        }
        .status-loading { background: #fef3c7; color: #d97706; }
        .status-success { background: #dcfce7; color: #15803d; }
        .status-error { background: #fee2e2; color: #b91c1c; }
        
        /* ===== LOADING ===== */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .loading.show { display: flex; }
        .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #f59e0b; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 2100;
            animation: fadeUp 0.3s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        
        @media (max-width: 550px) {
            body { padding: 12px; }
            .glass-header { padding: 10px 16px; }
            .logo-mini .brand-text .title { font-size: 0.85rem; }
            .logo-mini .brand-text .subtitle { font-size: 0.4rem; }
            .info-section { padding: 55px 16px 20px; }
            .name { font-size: 1.3rem; }
            .modal-card { padding: 24px 18px; }
            .btn-group { flex-direction: column; }
            .btn { justify-content: center; }
            .info-grid { gap: 8px; }
            .info-row { padding: 10px 12px; font-size: 0.8rem; }
            .info-label { min-width: 60px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="loading" id="loading"><div class="spinner"></div></div>

<!-- Edit Modal -->
<div class="modal" id="editModal">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i class="fas fa-user-edit"></i> Edit Profile</h3>
            <button class="close-modal" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
        </div>
        <div style="max-height: 60vh; overflow-y: auto; padding-right: 4px;">
            <div class="form-group">
                <label><i class="fas fa-image"></i> Profile Picture</label>

    <!-- Header -->
    <div class="glass-header">
        <button class="icon-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="logo-mini">

                <span class="subtitle" id="brandSubtitle">EMPLOYEE PORTAL</span>

<script type="module">
    // ===== LOAD BRANDING =====
    async function loadBranding() {
        try {
            const brandSnap = await window.get(window.ref(window.db, 'companyAssets/branding'));
            if (brandSnap.exists()) {
                const brand = brandSnap.val();
                document.getElementById('brandTitle').textContent = brand.title || 'SP CONSTRUCTION';
                document.getElementById('brandSubtitle').textContent = brand.subtitle || 'EMPLOYEE PORTAL';
            }
        } catch(e) { console.warn("Error loading branding:", e); }
    }
    
    // ===== LOAD LOGO =====
    async function loadCompanyLogo() {
        try {
            const logoRef = window.ref(window.db, 'companyAssets/footerLogo');
            const logoSnap = await window.get(logoRef);
            const headerLogo = document.getElementById('headerLogo');
            if (logoSnap.exists() && logoSnap.val()?.startsWith('data:image')) {
                headerLogo.innerHTML = `<img src="${logoSnap.val()}" alt="Logo">`;
            } else {
                headerLogo.innerHTML = `<span>SP</span>`;
            }
        } catch(e) { console.warn("Error loading logo:", e); }
    }
    
    let currentUserData = {};
    let currentAuth = null;
    let selectedBase64 = null;
    
    function showLoading(show) { document.getElementById('loading').classList.toggle('show', show); }
    
    function showToast(msg, isErr = false) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
        t.style.background = isErr ? '#dc2626' : '#15803d';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    
    // ===== IMAGE COMPRESSION =====
    async function smartCompressImage(file, onProgress) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    if (onProgress) onProgress(20);
                    let width = img.width;
                    let height = img.height;
                    const maxPixels = 1024 * 1024;
                    const currentPixels = width * height;
                    
                    let scale = 1;
                    if (currentPixels > maxPixels * 4) scale = Math.sqrt(maxPixels / currentPixels) * 0.8;
                    else if (currentPixels > maxPixels * 2) scale = Math.sqrt(maxPixels / currentPixels) * 0.9;
                    else if (currentPixels > maxPixels) scale = Math.sqrt(maxPixels / currentPixels);
                    
                    let newWidth = Math.max(400, Math.floor(width * scale));
                    let newHeight = Math.max(400, Math.floor(height * scale));
                    
                    if (onProgress) onProgress(40);
                    const canvas = document.createElement('canvas');
                    canvas.width = newWidth;
                    canvas.height = newHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, newWidth, newHeight);
                    
                    if (onProgress) onProgress(60);
                    let quality = 0.75;
                    let attempt = 0;
                    let finalBase64 = '';
                    
                    const tryCompress = () => {
                        finalBase64 = canvas.toDataURL('image/jpeg', quality);
                        const approxSize = Math.round((finalBase64.length * 3/4) / 1024);
                        if (onProgress) onProgress(70 + attempt * 10);
                        if (approxSize > 4800 && quality > 0.45 && attempt < 3) {
                            quality -= 0.1;
                            attempt++;
                            tryCompress();
                        } else {
                            if (onProgress) onProgress(100);
                            resolve(finalBase64);
                        }
                    };
                    tryCompress();
                };
                img.onerror = () => reject(new Error("Failed to load image"));
                img.src = e.target.result;
            };
            reader.onerror = () => reject(new Error("File reading failed"));
            reader.readAsDataURL(file);
        });
    }
    
    async function processProfileImage(file, onProgress) {
        if (!file.type.match('image.*')) throw new Error('Please select a valid image file');
        if (onProgress) onProgress(5);
        const compressedBase64 = await smartCompressImage(file, onProgress);
        if (compressedBase64.length > 7_000_000) {
            const img = new Image();
            const result = await new Promise((resolve) => {
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    const targetPixels = 800 * 800;
                    if (w * h > targetPixels) {
                        const ratio = Math.sqrt(targetPixels / (w * h));
                        w = Math.floor(w * ratio);
                        h = Math.floor(h * ratio);
                    }
                    canvas.width = w;
                    canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.65));
                };
                img.src = compressedBase64;
            });
            return result;
        }
        return compressedBase64;
    }
    
    // ===== RENDER PROFILE =====
    function renderProfile(data, emailVerified) {
        const avatarDiv = document.getElementById('avatarDisplay');
        const initialsSpan = document.getElementById('avatarInitials');
        if (data.profilePicture && data.profilePicture.startsWith('data:image')) {
            avatarDiv.innerHTML = `<img src="${data.profilePicture}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
        } else {
            let first = data.firstName || '';
            let last = data.lastName || '';
            let init = (first.charAt(0)+last.charAt(0)).toUpperCase();
            if (!init.trim()) init = 'SP';
            initialsSpan.textContent = init;
            avatarDiv.innerHTML = '';
            avatarDiv.appendChild(initialsSpan);
            avatarDiv.style.background = 'linear-gradient(135deg, #f59e0b, #d97706)';
        }
        document.getElementById('fullName').innerHTML = `${escapeHtml(data.firstName||'')} ${escapeHtml(data.lastName||'')}`.trim() || data.email || 'User';
        document.getElementById('userIdSpan').innerHTML = data.userId || (currentAuth?.uid.slice(0,8).toUpperCase()) || '----';
        
        const verifyDiv = document.getElementById('verifyBadge');
        const isVerified = emailVerified === true || data.emailVerified === true;
        verifyDiv.innerHTML = isVerified ? '<i class="fas fa-check-circle"></i> Email Verified' : '<i class="fas fa-times-circle"></i> Email Not Verified';
        verifyDiv.className = isVerified ? 'verify-badge verified' : 'verify-badge not-verified';
        
        const fields = [
            { label: 'First Name', value: data.firstName || 'Not set' },
            { label: 'Last Name', value: data.lastName || 'Not set' },
            { label: 'Email', value: data.email || 'Not set' },
            { label: 'Phone', value: data.mobile || 'Not set' },
            { label: 'Aadhar', value: data.aadhar ? '•••• '+data.aadhar.slice(-4) : 'Not set' },
            { label: 'DOB', value: data.dob || 'Not set' },
            { label: 'Position', value: data.position || 'Not set' },
            { label: 'Company', value: data.company || 'Not set' },
            { label: 'Address', value: data.address || 'Not set' },
            { label: 'Member Since', value: data.registeredAt ? new Date(data.registeredAt).toLocaleDateString() : 'Not set' }
        ];
        const grid = document.getElementById('infoGrid');
        grid.innerHTML = fields.map(f => `
            <div class="info-row">
                <div class="info-label">${f.label}</div>
                <div class="info-value">${escapeHtml(f.value)}</div>
            </div>
        `).join('');
    }
    
    // ===== LOAD USER =====
    async function loadUser(user) {
        if(!user) return;
        currentAuth = user;
        showLoading(true);
        try {
            const userRef = window.ref(window.db, `users/${user.uid}`);
            const snap = await window.get(userRef);
            let data = snap.val();
            if(!data) {
                data = {
                    uid: user.uid,
                    email: user.email,
                    firstName: '',
                    lastName: '',
                    mobile: '',
                    aadhar: '',
                    dob: '',
                    position: '',
                    company: '',
                    address: '',
                    userId: user.uid.slice(0,8).toUpperCase(),
                    registeredAt: new Date().toISOString(),
                    emailVerified: user.emailVerified
                };
                await window.update(userRef, data);
            }
            currentUserData = data;
            renderProfile(data, user.emailVerified);
        } catch(e) { showToast('Error loading profile', true); }
        showLoading(false);
    }
    
    window.refreshProfile = async () => { if(currentAuth) await loadUser(currentAuth); else window.location.href='login.html'; };
    
    // ===== EDIT MODAL =====
    function openEditModal() {
        if(!currentUserData) return;
        document.getElementById('editFname').value = currentUserData.firstName || '';
        document.getElementById('editLname').value = currentUserData.lastName || '';
        document.getElementById('editEmail').value = currentUserData.email || '';
        document.getElementById('editPhone').value = currentUserData.mobile || '';
        document.getElementById('editAadhar').value = currentUserData.aadhar || '';
        document.getElementById('editDob').value = currentUserData.dob || '';
        document.getElementById('editPosition').value = currentUserData.position || '';
        document.getElementById('editCompany').value = currentUserData.company || '';
        document.getElementById('editAddress').value = currentUserData.address || '';
        const preview = document.getElementById('modalPreview');
        if(currentUserData.profilePicture && currentUserData.profilePicture.startsWith('data:image')) preview.src = currentUserData.profilePicture;
        else preview.src = 'https://via.placeholder.com/76?text=Avatar';
        selectedBase64 = currentUserData.profilePicture || null;
        document.getElementById('editModal').classList.add('show');
        const statusDiv = document.getElementById('uploadStatus');
        statusDiv.innerHTML = '';
        statusDiv.className = 'upload-status';
    }
    window.closeEditModal = () => { document.getElementById('editModal').classList.remove('show'); selectedBase64 = null; };
    
    // ===== IMAGE UPLOAD =====
    function setupImageUpload() {
        const fileInput = document.getElementById('picUpload');
        const statusDiv = document.getElementById('uploadStatus');
        
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            if(!file.type.match('image.*')) { showToast('Please select an image file', true); return; }
            
            statusDiv.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing image... 0%';
            statusDiv.className = 'upload-status status-loading';
            
            try {
                const updateProgress = (percent) => {
                    statusDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> ${percent < 30 ? 'Decoding...' : percent < 70 ? 'Compressing...' : 'Finalizing...'} ${percent}%`;
                };
                const compressedBase64 = await processProfileImage(file, updateProgress);
                selectedBase64 = compressedBase64;
                document.getElementById('modalPreview').src = compressedBase64;
                
                const finalSizeKB = Math.round((compressedBase64.length * 3/4) / 1024);
                statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Ready! (${finalSizeKB} KB)`;
                statusDiv.className = 'upload-status status-success';
                setTimeout(() => { if (statusDiv.innerHTML.includes('Ready')) statusDiv.innerHTML = ''; }, 3000);
                showToast(`Image compressed (${finalSizeKB} KB)`);
            } catch(err) {
                console.error(err);
                statusDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> Failed to process image';
                statusDiv.className = 'upload-status status-error';
                showToast('Image processing failed', true);
            }
        };
        
        document.getElementById('avatarTrigger').onclick = () => {
            fileInput.click();
        };
    }
    
    // ===== SAVE PROFILE =====
    window.saveProfile = async () => {
        const updated = {
            firstName: document.getElementById('editFname').value.trim(),
            lastName: document.getElementById('editLname').value.trim(),
            mobile: document.getElementById('editPhone').value.trim(),
            aadhar: document.getElementById('editAadhar').value.trim(),
            dob: document.getElementById('editDob').value,
            position: document.getElementById('editPosition').value.trim(),
            company: document.getElementById('editCompany').value.trim(),
            address: document.getElementById('editAddress').value.trim(),
            email: currentUserData.email,
            userId: currentUserData.userId,
            registeredAt: currentUserData.registeredAt,
            emailVerified: currentAuth?.emailVerified || false,
            uid: currentAuth?.uid
        };
        if(selectedBase64 && selectedBase64.startsWith('data:image')) updated.profilePicture = selectedBase64;
        else if(selectedBase64 === null && currentUserData.profilePicture) updated.profilePicture = currentUserData.profilePicture;
        updated.fullName = `${updated.firstName} ${updated.lastName}`.trim() || updated.email;
        
        showLoading(true);
        try {
            const userRef = window.ref(window.db, `users/${currentAuth.uid}`);
            await window.update(userRef, updated);
            if(updated.fullName && currentAuth) await window.updateProfile(currentAuth, { displayName: updated.fullName }).catch(e=>console.warn);
            currentUserData = {...currentUserData, ...updated};
            renderProfile(currentUserData, currentAuth.emailVerified);
            showToast('Profile updated successfully!');
            closeEditModal();
        } catch(err) { showToast('Update failed: '+err.message, true); }
        showLoading(false);
    };
    
    // ===== LOGOUT =====
    window.logoutUser = async () => {
        showLoading(true);
        try {
            await window.signOut(window.auth);
            localStorage.clear();
            window.location.href = 'login.html';
        } catch(e) { showLoading(false); showToast('Logout failed', true); }
    };
    
    // ===== INIT =====
    window.onAuthStateChanged(window.auth, async (user) => {
        if(!user) window.location.href = 'login.html';
        else {
            await loadBranding();
            await loadCompanyLogo();
            await loadUser(user);
        }
    });
    
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('editBtn').addEventListener('click', openEditModal);
        setupImageUpload();
    });
</script>
</body>
</html>
